<html lang="ja">
<head>
<meta charset="UTF-8">

<title>第32回横浜経済人会議 | 広報スケジュール</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#0d1b3e;--gold:#c9a84c;--gold-light:#e8c97d;--bg:#f5f3ee;--gray-50:#f9f8f6;--gray-100:#f0ede6;--gray-200:#e2ddd4;--gray-400:#9e9488;--gray-600:#6b6358;--gray-800:#3a342c;--green:#1a7a4a;--green-light:#e8f5ed;--red:#c0392b;--orange:#c76b0a;--blue:#1a4a8a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--gray-800);min-height:100vh;}
#toolbar{background:var(--navy);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:40px;z-index:80;border-bottom:2px solid var(--gold);}
.toolbar-title{font-family:'Noto Serif JP',serif;font-size:13px;color:var(--gold-light);font-weight:600;}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 13px;border-radius:4px;border:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:500;transition:all 0.15s;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--navy);}
.btn-outline{background:transparent;color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.2);}
.btn-outline:hover{background:rgba(255,255,255,0.08);}
.btn-sm{padding:4px 9px;font-size:11px;}
.btn-danger{background:var(--red);color:#fff;}
.btn-light{background:#fff;color:var(--gray-800);border:1px solid var(--gray-200);}
#main{max-width:1100px;margin:0 auto;padding:20px 24px;}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--gray-200);margin-bottom:18px;}
.tab{padding:9px 20px;cursor:pointer;border:none;background:none;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--gray-600);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.15s;}
.tab.active{color:var(--navy);border-bottom-color:var(--gold);font-weight:600;}
.card{background:#fff;border:1px solid var(--gray-200);border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.05);margin-bottom:18px;}
.card-header{padding:12px 16px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-family:'Noto Serif JP',serif;font-size:13px;font-weight:600;color:var(--navy);}
.progress-strip{background:#fff;border:1px solid var(--gray-200);border-radius:8px;padding:14px 18px;margin-bottom:16px;display:flex;gap:20px;align-items:center;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
.prog-item{text-align:center;}
.prog-num{font-size:22px;font-weight:700;color:var(--navy);}
.prog-label{font-size:10px;color:var(--gray-400);}
.prog-bar{flex:1;min-width:200px;}
.prog-bar-track{height:8px;background:var(--gray-100);border-radius:4px;overflow:hidden;}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--green),#4aba7a);border-radius:4px;transition:width 0.4s;}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;}
.tbl thead tr{background:var(--navy);}
.tbl th{padding:9px 12px;text-align:left;font-size:10.5px;font-weight:600;color:rgba(255,255,255,0.8);white-space:nowrap;}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--gray-100);font-size:12.5px;vertical-align:top;}
.tbl tbody tr:hover td{background:var(--gray-50);}
.tbl tbody tr.done td{opacity:0.45;}
.check-cell{width:32px;text-align:center;cursor:pointer;}
.check-box{width:17px;height:17px;border:2px solid var(--gray-200);border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:#fff;transition:all 0.15s;}
.check-box.done{background:var(--green);border-color:var(--green);}
.period-badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10.5px;font-weight:600;white-space:nowrap;}
.media-badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10.5px;font-weight:600;background:var(--gray-100);color:var(--gray-600);}
.action-cell{white-space:nowrap;opacity:0;}
.tbl tbody tr:hover .action-cell{opacity:1;}
.act-btn{padding:2px 7px;border-radius:3px;border:none;cursor:pointer;font-size:10px;font-weight:600;margin-left:3px;}
.act-edit{background:var(--navy);color:#fff;}
.act-del{background:var(--red);color:#fff;}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(13,27,62,0.45);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:8px;width:520px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15);}
.modal-header{padding:14px 18px 11px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Noto Serif JP',serif;font-size:14px;font-weight:600;color:var(--navy);}
.modal-close{background:none;border:none;cursor:pointer;font-size:18px;color:var(--gray-400);}
.modal-body{padding:14px 18px;}
.modal-footer{padding:11px 18px;border-top:1px solid var(--gray-100);display:flex;justify-content:flex-end;gap:7px;}
.form-row{margin-bottom:11px;}
.form-label{font-size:11px;font-weight:600;color:var(--gray-600);margin-bottom:3px;display:block;}
.form-input,.form-select{width:100%;padding:7px 10px;border:1px solid var(--gray-200);border-radius:4px;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--gray-800);background:#fff;outline:none;}
.form-input:focus,.form-select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.1);}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
#toast-c{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;align-items:center;gap:6px;}
.toast{background:var(--navy);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;border:1px solid var(--gold);animation:tin 0.2s;}
@keyframes tin{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
#portal-nav{background:#060f22 !important;}
#portal-nav a,#portal-nav-links a{text-decoration:none !important;}
#portal-nav>a{color:#c9a84c !important;flex-shrink:0;}
@media(max-width:768px){#main{padding:12px 14px;}.tbl{min-width:600px;}.card{overflow-x:auto;}.tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;}.tab{white-space:nowrap;font-size:12px;padding:8px 12px;}.action-cell{opacity:1 !important;}#portal-nav a{font-size:10px !important;padding:3px 6px !important;}}
</style>
</head>

  <span class="toolbar-title">📣 広報スケジュール</span>
  <div style="flex:1"></div>

  <div class="modal">
    <div class="modal-header"><div class="modal-title" id="edit-title">広報を追加</div><button class="modal-close" onclick="closeModal('modal-edit')">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <input type="hidden" id="edit-type">
      <div class="grid-2">
        <div class="form-row"><label class="form-label">日付</label><input class="form-input" type="date" id="edit-date"></div>

          <select class="form-select" id="edit-period">
            <option>事業承認後</option><option>1ヶ月半前</option><option>1ヶ月前</option>
            <option>半月前</option><option>1週間前</option><option>前日</option><option>事業後</option>
          </select>

      <button class="btn btn-danger btn-sm" id="edit-del-btn" onclick="deleteItem()" style="margin-right:auto;display:none">削除</button>
      <button class="btn btn-light btn-sm" onclick="closeModal('modal-edit')">キャンセル</button>
      <button class="btn btn-gold" onclick="saveItem()">保存</button>
    </div>
  </div>
</div>

<script>
const PERIOD_COLORS={'事業承認後':'#7d3c98','1ヶ月半前':'#1a4a8a','1ヶ月前':'#c76b0a','半月前':'#c0392b','1週間前':'#1a7a4a','前日':'#0d1b3e','事業後':'#566573'};

let gaigai=[
  {id:'g01',done:false,date:'2026-07-08',period:'事業承認後',content:'横浜JC公式SNS告知①（デジタルフライヤー配信）',owner:'荒井 亮一',media:'SNS（HP/FB/Instagram）'},
  {id:'g02',done:false,date:'2026-07-14',period:'1ヶ月半前',content:'PR TIMES・PressWalkerによる配信（第1回）',owner:'弘中 義之',media:'PR配信'},
  {id:'g03',done:false,date:'2026-07-14',period:'1ヶ月半前',content:'プレスリリース第1回配信（市政記者会13社・キー局FAX）',owner:'福田 雄太郎',media:'FAX/メール'},
  {id:'g04',done:false,date:'2026-07-14',period:'1ヶ月半前',content:'メール・FAX案内資料送付（開催案内先一覧に基づき）',owner:'弘中 義之',media:'メール/FAX'},
  {id:'g05',done:false,date:'2026-07-14',period:'1ヶ月半前',content:'後援先への後援依頼・当日参加依頼実施',owner:'荒井 亮一',media:'メール/訪問'},
  {id:'g06',done:false,date:'2026-07-28',period:'1ヶ月前',content:'横浜JC公式SNS告知②（講師プロフィール・講演内容紹介）',owner:'荒井 亮一',media:'SNS'},
  {id:'g07',done:false,date:'2026-08-14',period:'半月前',content:'開催予告動画 配信（YouTube・SNS）',owner:'荒井 亮一',media:'YouTube/SNS'},
  {id:'g08',done:false,date:'2026-08-14',period:'半月前',content:'プレスリリース第2回配信（再配信）',owner:'福田 雄太郎',media:'FAX/メール'},
  {id:'g09',done:false,date:'2026-08-14',period:'半月前',content:'PR TIMES・PressWalker再配信（第2回）',owner:'弘中 義之',media:'PR配信'},
  {id:'g10',done:false,date:'2026-08-14',period:'半月前',content:'SNS告知③（講師プロフィール・講演内容詳細紹介）',owner:'荒井 亮一',media:'SNS'},
  {id:'g11',done:false,date:'2026-08-21',period:'1週間前',content:'開催予告動画 再配信',owner:'荒井 亮一',media:'YouTube/SNS'},
  {id:'g12',done:false,date:'2026-08-21',period:'1週間前',content:'申込者へのリマインドメール送付（デジタルパンフ同封）',owner:'永井 嵩久',media:'メール'},
  {id:'g13',done:false,date:'2026-08-21',period:'1週間前',content:'SNS告知④（最終案内・参加促進）',owner:'荒井 亮一',media:'SNS'},
  {id:'g14',done:false,date:'2026-09-05',period:'事業後',content:'SNS事業報告（FB・Instagram）',owner:'荒井 亮一',media:'SNS'},
  {id:'g15',done:false,date:'2026-10-01',period:'事業後',content:'アーカイブ動画 分割配信（4本）・登壇企業へ共有依頼',owner:'荒井 亮一',media:'YouTube'},
];

let nainai=[
  {id:'n01',done:false,date:'2026-07-08',period:'事業承認後',content:'公式LINEで告知①（デジタルフライヤー配信）',owner:'弘中 義之',media:'公式LINE'},
  {id:'n02',done:false,date:'2026-07-28',period:'1ヶ月前',content:'公式LINEで告知②（事業内容の周知①）',owner:'弘中 義之',media:'公式LINE'},
  {id:'n03',done:false,date:'2026-07-28',period:'1ヶ月前',content:'委員会PRを全委員会で実施（地域開発×国際観光で手分け）',owner:'荒井 亮一/弘中 義之',media:'対面/委員会'},
  {id:'n04',done:false,date:'2026-08-14',period:'半月前',content:'出席者一次確認',owner:'弘中 義之',media:'総括LINE'},
  {id:'n05',done:false,date:'2026-08-14',period:'半月前',content:'公式LINEで告知③（事業内容の周知②）',owner:'弘中 義之',media:'公式LINE'},
  {id:'n06',done:false,date:'2026-08-21',period:'1週間前',content:'公式LINEで告知④（事業内容の周知③）',owner:'弘中 義之',media:'公式LINE'},
  {id:'n07',done:false,date:'2026-08-21',period:'1週間前',content:'出席者二次確認',owner:'弘中 義之',media:'総括LINE'},
  {id:'n08',done:false,date:'2026-08-21',period:'1週間前',content:'対内メンバーへデジタルパンフレット配布',owner:'弘中 義之',media:'公式LINE'},
  {id:'n09',done:false,date:'2026-08-27',period:'前日',content:'公式LINE最終案内',owner:'弘中 義之',media:'公式LINE'},
];

let editingId=null;
let editingType=null;
let idCounter=200;

function getList(type){return type==='gaigai'?gaigai:nainai;}

function renderTable(type){
  const list=getList(type);
  const tbody=document.getElementById('tbody-'+type);
  tbody.innerHTML=list.map(r=>{
    const c=PERIOD_COLORS[r.period]||'#566573';
    return`<tr class="${r.done?'done':''}">
      <td class="check-cell" onclick="toggle('${r.id}','${type}')">
        <div class="check-box ${r.done?'done':''}">${r.done?'✓':''}</div>
      </td>
      <td style="white-space:nowrap;color:var(--gray-600);font-size:11.5px">${r.date}</td>
      <td><span class="period-badge" style="background:${c}18;color:${c};border:1px solid ${c}33">${r.period}</span></td>
      <td style="font-weight:${r.done?'400':'500'}">${r.content}</td>
      <td style="color:var(--gray-600);font-size:11.5px">${r.owner}</td>
      <td><span class="media-badge">${r.media}</span></td>
      <td class="action-cell">
        <button class="act-btn act-edit" onclick="openEditModal('${r.id}','${type}')">編集</button>
        <button class="act-btn act-del" onclick="deleteById('${r.id}','${type}')">削除</button>
      </td>
    </tr>`;
  }).join('');
  updateProgress();
}

function toggle(id,type){
  const list=getList(type);
  const r=list.find(x=>x.id===id);
  if(r){r.done=!r.done;renderTable(type);toast(r.done?'✅ 完了':'◻ 未対応に戻した');}
}

function updateProgress(){
  const all=[...gaigai,...nainai];
  const done=all.filter(x=>x.done).length;
  const total=all.length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('pr-done-all').textContent=done;
  document.getElementById('pr-total-all').textContent=total;
  document.getElementById('pr-pct').textContent=pct+'%';
  document.getElementById('pr-bar').style.width=pct+'%';
}

function showTab(id,btn){
  ['tab-gaigai','tab-nainai'].forEach(t=>document.getElementById(t).style.display='none');
  document.getElementById(id).style.display='block';
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

// ADD
function openAddModal(type){
  editingId=null;editingType=type;
  document.getElementById('edit-title').textContent=type==='gaigai'?'対外広報を追加':'対内広報を追加';
  document.getElementById('edit-id').value='';
  document.getElementById('edit-type').value=type;
  document.getElementById('edit-date').value='';
  document.getElementById('edit-period').value='事業承認後';
  document.getElementById('edit-content').value='';
  document.getElementById('edit-owner').value='';
  document.getElementById('edit-media').value='';
  document.getElementById('edit-del-btn').style.display='none';
  openModal('modal-edit');
}

// EDIT
function openEditModal(id,type){
  const list=getList(type);
  const r=list.find(x=>x.id===id);
  if(!r)return;
  editingId=id;editingType=type;
  document.getElementById('edit-title').textContent='広報を編集';
  document.getElementById('edit-id').value=id;
  document.getElementById('edit-type').value=type;
  document.getElementById('edit-date').value=r.date||'';
  document.getElementById('edit-period').value=r.period||'事業承認後';
  document.getElementById('edit-content').value=r.content||'';
  document.getElementById('edit-owner').value=r.owner||'';
  document.getElementById('edit-media').value=r.media||'';
  document.getElementById('edit-del-btn').style.display='inline-flex';
  openModal('modal-edit');
}

function saveItem(){
  const type=document.getElementById('edit-type').value;
  const list=getList(type);
  const payload={
    date:document.getElementById('edit-date').value,
    period:document.getElementById('edit-period').value,
    content:document.getElementById('edit-content').value,
    owner:document.getElementById('edit-owner').value,
    media:document.getElementById('edit-media').value,
  };
  if(!payload.content){toast('内容を入力してください');return;}
  if(editingId){
    const r=list.find(x=>x.id===editingId);
    if(r)Object.assign(r,payload);
    toast('✅ 更新しました');
  } else {
    list.push({id:'u'+(idCounter++),done:false,...payload});
    toast('✅ 追加しました');
  }
  closeModal('modal-edit');
  renderTable(type);
}

function deleteItem(){
  const type=document.getElementById('edit-type').value;
  deleteById(editingId,type);
  closeModal('modal-edit');
}

function deleteById(id,type){
  if(!confirm('削除しますか？'))return;
  if(type==='gaigai')gaigai=gaigai.filter(x=>x.id!==id);
  else nainai=nainai.filter(x=>x.id!==id);
  renderTable(type);
  toast('削除しました');
}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
function toast(msg){const c=document.getElementById('toast-c');const t=document.createElement('div');t.className='toast';t.textContent=msg;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.3s';setTimeout(()=>t.remove(),300);},2500);}

renderTable('gaigai');renderTable('nainai');
</script>
</body>
</html>
