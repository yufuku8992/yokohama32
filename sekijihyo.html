<head>
<meta charset="UTF-8">

<title>第32回横浜経済人会議 席次表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0d1b3e; --gold:#c9a84c; --gold-light:#e8c97d;
  --white:#fff; --gray-100:#f0ede6; --gray-200:#e2ddd4; --gray-400:#9e9488; --gray-600:#6b6358;
  --red:#c0392b; --green:#1a7a4a; --blue:#1a4a8a; --orange:#c76b0a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;}

/* HEADER */
#header{background:linear-gradient(135deg,var(--navy),#1a2a5e);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--gold);}
.header-left{}
.event-title{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:700;color:var(--gold-light);}
.event-sub{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;}
.header-right{display:flex;align-items:center;gap:12px;}
.total-badge{background:rgba(201,168,76,0.15);border:1px solid var(--gold);border-radius:6px;padding:8px 16px;text-align:center;}
.total-num{font-size:24px;font-weight:700;color:var(--gold-light);line-height:1;}
.total-label{font-size:10px;color:rgba(255,255,255,0.5);margin-top:2px;}

/* CONTROLS */
#controls{background:#0d1b3e;padding:12px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,0.1);}
.ctrl-group{display:flex;align-items:center;gap:8px;}
.ctrl-label{font-size:11px;color:rgba(255,255,255,0.5);}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:4px;border:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:500;transition:all 0.15s;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--navy);}
.btn-outline{background:transparent;color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.2);}
.btn-outline:hover{background:rgba(255,255,255,0.1);}
.btn-red{background:var(--red);color:white;}
.zoom-val{color:white;font-size:13px;min-width:40px;text-align:center;}

/* MAIN */
#main{display:flex;gap:0;height:calc(100vh - 120px);}

/* SIDEBAR */
#sidebar{width:260px;background:#0a1128;border-right:1px solid rgba(255,255,255,0.08);overflow-y:auto;flex-shrink:0;}
.side-section{border-bottom:1px solid rgba(255,255,255,0.06);}
.side-section-header{padding:10px 14px;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.35);font-weight:600;background:rgba(0,0,0,0.2);}
.side-item{padding:8px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;transition:background 0.1s;}
.side-item:hover{background:rgba(255,255,255,0.04);}
.side-item-left{display:flex;align-items:center;gap:8px;}
.side-color{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.side-name{font-size:12px;color:rgba(255,255,255,0.8);}
.side-right{display:flex;align-items:center;gap:6px;}
.side-count{font-size:11px;color:rgba(255,255,255,0.4);}
.side-stepper{display:flex;align-items:center;gap:2px;}
.step-btn{width:20px;height:20px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.7);border-radius:3px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;line-height:1;}
.step-btn:hover{background:rgba(255,255,255,0.15);}
.step-val{font-size:12px;min-width:28px;text-align:center;color:white;font-weight:600;}
.fill-bar{height:3px;margin:0 14px 8px;border-radius:2px;background:rgba(255,255,255,0.08);overflow:hidden;}
.fill-bar-inner{height:100%;border-radius:2px;transition:width 0.3s;}

/* CANVAS AREA */
#canvas-wrap{flex:1;overflow:auto;position:relative;background:#12122a;}
#canvas{position:relative;transform-origin:top left;}

/* HALL */
.hall{position:absolute;border-radius:8px;}

/* STAGE */
.stage-box{position:absolute;background:linear-gradient(135deg,#2a1a00,#3d2800);border:2px solid var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;}
.stage-label{font-family:'Noto Serif JP',serif;font-size:13px;font-weight:700;color:var(--gold-light);letter-spacing:0.05em;}
.stage-sub{font-size:10px;color:rgba(255,204,51,0.6);}

/* SEAT BLOCK */
.seat-block{position:absolute;border-radius:5px;border:1.5px solid;cursor:pointer;transition:filter 0.15s,transform 0.1s;overflow:hidden;}
.seat-block:hover{filter:brightness(1.15);transform:scale(1.02);}
.seat-block-inner{padding:5px 7px;height:100%;display:flex;flex-direction:column;justify-content:space-between;}
.block-name{font-size:10px;font-weight:700;color:rgba(255,255,255,0.95);line-height:1.2;word-break:break-all;}
.block-count-row{display:flex;align-items:center;justify-content:space-between;margin-top:2px;}
.block-seats{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px;flex:1;align-content:flex-start;}
.seat{width:10px;height:10px;border-radius:2px;transition:background 0.2s;}
.seat.occupied{opacity:1;}
.seat.empty{opacity:0.25;}
.block-stats{font-size:9px;color:rgba(255,255,255,0.55);white-space:nowrap;}

/* AISLE */
.aisle{position:absolute;background:rgba(255,255,255,0.04);border:1px dashed rgba(255,255,255,0.12);border-radius:4px;display:flex;align-items:center;justify-content:center;}
.aisle-label{font-size:9px;color:rgba(255,255,255,0.25);letter-spacing:0.05em;}

/* LABEL */
.area-label{position:absolute;font-size:9px;color:rgba(255,255,255,0.25);letter-spacing:0.05em;text-transform:uppercase;}

/* LEGEND */
#legend{position:fixed;bottom:16px;right:16px;background:rgba(10,17,40,0.95);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:10px 14px;font-size:11px;}
.legend-title{color:rgba(255,255,255,0.5);margin-bottom:6px;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;}
.legend-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;color:rgba(255,255,255,0.7);}
.legend-dot{width:10px;height:10px;border-radius:2px;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#0d1b3e;border:1px solid rgba(201,168,76,0.3);border-radius:10px;width:380px;max-width:95vw;}
.modal-header{padding:16px 20px 12px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Noto Serif JP',serif;font-size:15px;font-weight:600;color:var(--gold-light);}
.modal-close{background:none;border:none;cursor:pointer;font-size:18px;color:rgba(255,255,255,0.4);}
.modal-body{padding:16px 20px;}
.modal-footer{padding:12px 20px;border-top:1px solid rgba(255,255,255,0.08);display:flex;justify-content:flex-end;gap:8px;}
.form-label{font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:4px;display:block;font-weight:600;}
.form-input,.form-select{width:100%;padding:7px 10px;border:1px solid rgba(255,255,255,0.15);border-radius:4px;background:rgba(255,255,255,0.05);color:white;font-family:'Noto Sans JP',sans-serif;font-size:13px;outline:none;margin-bottom:12px;}
.form-input:focus,.form-select:focus{border-color:var(--gold);}
.form-select option{background:#0d1b3e;}

/* TOAST */
#toast-container{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:6px;align-items:center;}
.toast{background:var(--navy);color:white;padding:9px 18px;border-radius:20px;font-size:12px;border:1px solid var(--gold);animation:fadeIn 0.2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

<script>
(function(){

  });
})();
</script>

const SCALE = 48; // px per cm

  { id:'vip_right',     name:'来賓（右）',       cap:12, occ:0, color:COLORS.vip,    x:320, y:460, w:120, h:120, fixed:false },

  // ===== 一般・対外席 =====

  { id:'general_c',     name:'一般席（中央）',   cap:60, occ:0, color:COLORS.general, x:200, y:165, w:220, h:180, fixed:false },
  { id:'kouensha',      name:'後援先団体',        cap:30, occ:0, color:'#558b2f',      x:420, y:165, w:140, h:180, fixed:false },

  // ===== 予備席 =====
  { id:'yobi',          name:'予備席',           cap:20, occ:0, color:COLORS.reserve, x:1060,y:260, w:120, h:90,  fixed:false },
  { id:'wheelchair',    name:'車椅子席',          cap:6,  occ:0, color:'#78909c',      x:1060,y:190, w:120, h:65,  fixed:false },
];

let currentScale = 1.0;
let editingId = null;

// ===== RENDER =====
function render() {
  const canvas = document.getElementById('canvas');
  canvas.style.width  = HALL_W + 'px';
  canvas.style.height = HALL_H + 'px';
  canvas.style.transform = `scale(${currentScale})`;
  canvas.style.transformOrigin = 'top left';
  canvas.innerHTML = '';

  // 背景（ホール外壁）
  const hall = document.createElement('div');
  hall.style.cssText = `position:absolute;left:0;top:0;width:${HALL_W}px;height:${HALL_H}px;background:#0e0e24;border-radius:8px;`;
  canvas.appendChild(hall);

  // ステージ
  const stage = document.createElement('div');
  stage.className = 'stage-box';
  stage.style.cssText = `left:60px;top:40px;width:${HALL_W-120}px;height:140px;`;
  stage.innerHTML = `<div class="stage-label">STAGE ｜ スクリーン</div><div class="stage-sub">第32回横浜経済人会議 ～横浜の価値を、未来の力に～</div>`;
  canvas.appendChild(stage);

  // 通路ライン
  const aisles = [
    {x:50,y:180,w:HALL_W-100,h:40,label:'前方通路'},
    {x:50,y:200+540,w:HALL_W-100,h:35,label:'後方通路'},
    {x:50,y:180,w:50,h:HALL_H-220,label:''},
    {x:HALL_W-100,y:180,w:50,h:HALL_H-220,label:''},
  ];
  aisles.forEach(a=>{
    const el=document.createElement('div');
    el.className='aisle';
    el.style.cssText=`left:${a.x}px;top:${a.y}px;width:${a.w}px;height:${a.h}px;`;
    if(a.label){el.innerHTML=`<span class="aisle-label">${a.label}</span>`;}
    canvas.appendChild(el);
  });

  // 各ブロック
  blocks.forEach(b=>{
    const el=document.createElement('div');
    el.className='seat-block';
    el.style.cssText=`left:${b.x}px;top:${b.y}px;width:${b.w}px;height:${b.h}px;background:${b.color}22;border-color:${b.color}88;`;
    el.onclick=()=>openEdit(b.id);

    const occ=Math.min(b.occ,b.cap);
    const pct=b.cap>0?Math.round(occ/b.cap*100):0;

    // 座席ドット
    const dotSize=10;const gap=2;
    const dotsPerRow=Math.max(1,Math.floor((b.w-12)/(dotSize+gap)));
    const dots=[];
    for(let i=0;i<b.cap;i++){
      dots.push(`<div class="seat ${i<occ?'occupied':'empty'}" style="width:${dotSize}px;height:${dotSize}px;background:${b.color};border-radius:2px;"></div>`);
    }

    el.innerHTML=`<div class="seat-block-inner">
      <div>
        <div class="block-name" style="color:${b.color};filter:brightness(1.8)">${b.name}</div>
        <div class="block-stats">${occ}/${b.cap}名 (${pct}%)</div>
      </div>
      <div class="block-seats" style="display:flex;flex-wrap:wrap;gap:2px;margin-top:3px;">${dots.slice(0,Math.min(b.cap,40)).join('')}${b.cap>40?`<div style="font-size:9px;color:rgba(255,255,255,0.4)">+${b.cap-40}</div>`:''}</div>
    </div>`;

    // 充填度バー
    const barEl=document.createElement('div');
    barEl.style.cssText=`position:absolute;bottom:0;left:0;right:0;height:4px;border-radius:0 0 4px 4px;background:rgba(255,255,255,0.06);overflow:hidden;`;
    barEl.innerHTML=`<div style="width:${pct}%;height:100%;background:${b.color};transition:width 0.3s;"></div>`;
    el.appendChild(barEl);

    canvas.appendChild(el);
  });

  renderSidebar();
  updateTotals();
  document.getElementById('canvas-wrap').style.width=(HALL_W*currentScale+40)+'px';
  document.getElementById('canvas-wrap').style.minHeight=(HALL_H*currentScale+40)+'px';
}

function renderSidebar() {
  const list=document.getElementById('sidebar-list');
  list.innerHTML=blocks.map(b=>{
    const pct=b.cap>0?Math.round(Math.min(b.occ,b.cap)/b.cap*100):0;
    return`<div class="side-item" onclick="openEdit('${b.id}')">
      <div class="side-item-left">
        <div class="side-color" style="background:${b.color}"></div>
        <div class="side-name">${b.name}</div>
      </div>
      <div class="side-right">
        <div class="side-stepper">
          <button class="step-btn" onclick="event.stopPropagation();stepOcc('${b.id}',-1)">－</button>
          <span class="step-val">${Math.min(b.occ,b.cap)}</span>
          <button class="step-btn" onclick="event.stopPropagation();stepOcc('${b.id}',1)">＋</button>
        </div>
        <div class="side-count">/${b.cap}</div>
      </div>
    </div>
    <div class="fill-bar"><div class="fill-bar-inner" style="width:${pct}%;background:${b.color};"></div></div>`;
  }).join('');
}

function updateTotals() {
  const totalCap=blocks.reduce((s,b)=>s+b.cap,0);
  const totalOcc=blocks.reduce((s,b)=>s+Math.min(b.occ,b.cap),0);
  const pct=totalCap>0?Math.round(totalOcc/totalCap*100):0;
  document.getElementById('total-occupied').textContent=totalOcc;
  document.getElementById('total-cap').textContent=totalCap;
  document.getElementById('total-pct').textContent=pct+'%';
}

// ===== CONTROLS =====
let zoomLevel=1.0;
function zoom(delta){
  zoomLevel=Math.min(2.5,Math.max(0.3,zoomLevel+delta));
  currentScale=zoomLevel;
  document.getElementById('zoom-label').textContent=Math.round(zoomLevel*100)+'%';
  render();
}
function resetZoom(){zoomLevel=1.0;currentScale=1.0;document.getElementById('zoom-label').textContent='100%';render();}

function stepOcc(id,delta){
  const b=blocks.find(x=>x.id===id);if(!b)return;
  b.occ=Math.max(0,Math.min(b.cap,b.occ+delta));
  render();
  toast(`${b.name}: ${b.occ}/${b.cap}名`);
}

function fillAll(){blocks.forEach(b=>b.occ=b.cap);render();toast('全席着席にしました');}
function clearAll(){blocks.forEach(b=>b.occ=0);render();toast('全席クリアしました');}

// ===== EDIT MODAL =====
function openEdit(id){
  const b=blocks.find(x=>x.id===id);if(!b)return;
  editingId=id;
  document.getElementById('edit-modal-title').textContent=b.name+' を編集';
  document.getElementById('edit-name').value=b.name;
  document.getElementById('edit-cap').value=b.cap;
  document.getElementById('edit-occ').value=b.occ;
  document.getElementById('edit-color').value=b.color;
  openModal('modal-edit');
}
function saveEdit(){
  const b=blocks.find(x=>x.id===editingId);if(!b)return;
  b.name=document.getElementById('edit-name').value||b.name;
  b.cap=parseInt(document.getElementById('edit-cap').value)||b.cap;
  b.occ=Math.min(parseInt(document.getElementById('edit-occ').value)||0,b.cap);
  b.color=document.getElementById('edit-color').value;
  closeModal('modal-edit');
  render();
  toast('更新しました');
}
function deleteBlock(){
  if(!confirm('このブロックを削除しますか？'))return;
  blocks=blocks.filter(x=>x.id!==editingId);
  closeModal('modal-edit');
  render();
  toast('削除しました');
}

// ===== ADD MODAL =====
function addBlock(){
  const name=document.getElementById('add-name').value.trim();
  if(!name){toast('名前を入力してください');return;}
  const cap=parseInt(document.getElementById('add-cap').value)||20;
  const color=document.getElementById('add-color').value;
  blocks.push({
    id:'block_'+Date.now(),
    name,cap,occ:0,color,
    x:Math.random()*(HALL_W-200)+100,
    y:Math.random()*(HALL_H-200)+200,
    w:140,h:120,fixed:false
  });
  closeModal('modal-add');
  render();
  toast(name+'を追加しました');
  document.getElementById('add-name').value='';
}

// ===== MODAL =====
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));

// ===== TOAST =====
function toast(msg){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');t.className='toast';t.textContent=msg;c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.3s';setTimeout(()=>t.remove(),300);},2500);
}

// ===== INIT =====
render();
</script>
</body>
