<style>
:root{--navy:#0d1b3e;--gold:#c9a84c;--gold-light:#e8c97d;--bg:#f5f3ee;--gray-50:#f9f8f6;--gray-100:#f0ede6;--gray-200:#e2ddd4;--gray-400:#9e9488;--gray-600:#6b6358;--gray-800:#3a342c;--green:#1a7a4a;--green-light:#e8f5ed;--red:#c0392b;--red-light:#fdecea;--orange:#c76b0a;--orange-light:#fef3e2;--blue:#1a4a8a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--gray-800);min-height:100vh;}
#toolbar{background:var(--navy);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:40px;z-index:80;border-bottom:2px solid var(--gold);}
.toolbar-title{font-family:'Noto Serif JP',serif;font-size:13px;color:var(--gold-light);font-weight:600;}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#9e9488;margin-right:4px;}
.sync-dot.on{background:#4aba7a;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.sync-label{font-size:11px;color:rgba(255,255,255,0.4);}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 13px;border-radius:4px;border:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:500;transition:all 0.15s;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--navy);}
.btn-outline{background:transparent;color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.2);}
.btn-outline:hover{background:rgba(255,255,255,0.08);}
.btn-sm{padding:4px 9px;font-size:11px;}
.btn-danger{background:var(--red);color:#fff;}
.btn-light{background:#fff;color:var(--gray-800);border:1px solid var(--gray-200);}
.btn-green{background:var(--green);color:#fff;}
#main{max-width:1100px;margin:0 auto;padding:20px 24px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.card{background:#fff;border:1px solid var(--gray-200);border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
.card-header{padding:12px 16px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-family:'Noto Serif JP',serif;font-size:13px;font-weight:600;color:var(--navy);}
/* TROUBLE */
.trouble-item{padding:13px 16px;border-bottom:1px solid var(--gray-100);border-left:4px solid var(--orange);}
.trouble-item:last-child{border-bottom:none;}
.trouble-item.resolved{border-left-color:var(--green);opacity:0.7;}
.trouble-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:4px;}
.trouble-title{font-size:13px;font-weight:600;flex:1;}
.trouble-badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10.5px;font-weight:600;white-space:nowrap;}
.b-open{background:var(--orange-light);color:var(--orange);}
.b-resolved{background:var(--green-light);color:var(--green);}
.b-urgent{background:var(--red);color:#fff;}
.trouble-meta{font-size:11px;color:var(--gray-400);margin-bottom:5px;}
.trouble-detail{font-size:12.5px;color:var(--gray-600);line-height:1.6;}
.trouble-action-text{font-size:12px;color:var(--green);margin-top:4px;}
.trouble-btns{margin-top:8px;display:flex;gap:5px;}
.t-btn{padding:3px 9px;border-radius:3px;border:none;cursor:pointer;font-size:11px;font-weight:600;}
.t-resolve{background:var(--green);color:#fff;}
.t-reopen{background:var(--gray-200);color:var(--gray-600);}
.t-edit{background:var(--navy);color:#fff;}
.t-del{background:var(--red);color:#fff;}
/* FAQ */
.faq-cat{font-family:'Noto Serif JP',serif;font-size:12px;font-weight:600;color:var(--navy);padding:9px 16px 6px;background:var(--gray-50);border-bottom:1px solid var(--gray-200);}
.faq-item{border-bottom:1px solid var(--gray-100);}
.faq-q{padding:11px 16px;cursor:pointer;display:flex;align-items:flex-start;gap:8px;font-size:13px;font-weight:600;color:var(--navy);background:none;border:none;width:100%;text-align:left;transition:background 0.1s;}
.faq-q:hover{background:var(--gray-50);}
.faq-q-icon{color:var(--gold);font-weight:700;flex-shrink:0;}
.faq-arrow{margin-left:auto;font-size:11px;color:var(--gray-400);transition:transform 0.2s;flex-shrink:0;}
.faq-a{display:none;padding:0 16px 12px 40px;font-size:12.5px;color:var(--gray-600);line-height:1.75;border-left:3px solid var(--gold);margin:0 16px 10px;background:rgba(201,168,76,0.04);border-radius:0 4px 4px 0;}
.faq-item.open .faq-a{display:block;}
.faq-item.open .faq-arrow{transform:rotate(180deg);}
.faq-edit-btn{margin-left:auto;padding:2px 7px;border-radius:3px;border:none;cursor:pointer;font-size:10px;font-weight:600;background:var(--navy);color:#fff;opacity:0;}
.faq-q:hover .faq-edit-btn{opacity:1;}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(13,27,62,0.45);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:8px;width:540px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15);}
.modal-header{padding:14px 18px 11px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Noto Serif JP',serif;font-size:14px;font-weight:600;color:var(--navy);}
.modal-close{background:none;border:none;cursor:pointer;font-size:18px;color:var(--gray-400);}
.modal-body{padding:14px 18px;}
.modal-footer{padding:11px 18px;border-top:1px solid var(--gray-100);display:flex;justify-content:flex-end;gap:7px;}
.form-row{margin-bottom:11px;}
.form-label{font-size:11px;font-weight:600;color:var(--gray-600);margin-bottom:3px;display:block;}
.form-input,.form-select,.form-textarea{width:100%;padding:7px 10px;border:1px solid var(--gray-200);border-radius:4px;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--gray-800);background:#fff;outline:none;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.1);}
.form-textarea{resize:vertical;min-height:80px;line-height:1.6;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.empty{text-align:center;padding:30px;color:var(--gray-400);font-size:13px;}
#toast-c{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;align-items:center;gap:6px;}
.toast{background:var(--navy);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;border:1px solid var(--gold);animation:tin 0.2s;}
@keyframes tin{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
#portal-nav{background:#060f22 !important;}
#portal-nav a,#portal-nav-links a{text-decoration:none !important;}
#portal-nav>a{color:#c9a84c !important;flex-shrink:0;}
@media(max-width:768px){#main{padding:12px 14px;}.grid-2{grid-template-columns:1fr;}.faq-edit-btn{opacity:1 !important;}#portal-nav a{font-size:10px !important;padding:3px 6px !important;}}
</style>

<script>
const SB_URL='https://kukckeksvbdgosneezdh.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1a2NrZWtzdmJkZ29zbmVlemRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1Nzg2MjksImV4cCI6MjA5NjE1NDYyOX0.zM264r67WV4YI7_7cqC53rx5dYYoc77VncKydfNHQUY';
const sb=supabase.createClient(SB_URL,SB_KEY);
let troubles=[];
let editingTroubleId=null;

// ===== TROUBLE =====
function setSyncStatus(s){const dot=document.getElementById('sync-dot'),label=document.getElementById('sync-label');if(s==='on'){dot.className='sync-dot on';label.textContent='リアルタイム同期中';}else{dot.className='sync-dot';label.textContent='接続中...';}}
async function loadTroubles(){const{data}=await sb.from('incidents').select('*').order('created_at',{ascending:false});troubles=data||[];renderTroubles();}

function renderTroubles(){
  const el=document.getElementById('trouble-list');
  const openCount=troubles.filter(t=>!t.resolved).length;
  document.getElementById('trouble-open-count').textContent='対応中 '+openCount+'件';
  if(!troubles.length){el.innerHTML='<div class="empty">トラブルはありません ✅</div>';return;}
  const urgMap={urgent:'🔴 緊急',normal:'🟡 通常',low:'🟢 軽微'};
  el.innerHTML=troubles.map(t=>`
    <div class="trouble-item ${t.resolved?'resolved':''}">
      <div class="trouble-top">
        <div class="trouble-title">⚠️ ${t.title}</div>
        <span class="trouble-badge ${t.resolved?'b-resolved':t.urgency==='urgent'?'b-urgent':'b-open'}">${t.resolved?'✓ 解決済':urgMap[t.urgency||'normal']}</span>
      </div>
      <div class="trouble-meta">📍 ${t.location||'—'} · 👤 ${t.assignee||'—'} · 🕐 ${fmtTime(t.created_at)}</div>
      ${t.detail?`<div class="trouble-detail">📋 ${t.detail}</div>`:''}
      ${t.action?`<div class="trouble-action-text">✅ 対応: ${t.action}</div>`:''}
      <div class="trouble-btns">
        ${!t.resolved?`<button class="t-btn t-resolve" onclick="resolveTrouble('${t.id}')">✓ 解決済み</button>`:`<button class="t-btn t-reopen" onclick="reopenTrouble('${t.id}')">再開</button>`}
        <button class="t-btn t-edit" onclick="openEditTrouble('${t.id}')">編集</button>
        <button class="t-btn t-del" onclick="deleteTroubleById('${t.id}')">削除</button>
      </div>
    </div>`).join('');
}

function openTroubleModal(){
  editingTroubleId=null;
  document.getElementById('trouble-modal-title').textContent='🚨 トラブルを記録';
  document.getElementById('tr-id').value='';
  ['tr-title','tr-loc','tr-detail','tr-action'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('tr-urgency').value='normal';
  document.getElementById('tr-del-btn').style.display='none';
  openModal('modal-trouble');
}
function openEditTrouble(id){
  const t=troubles.find(x=>x.id===id);if(!t)return;
  editingTroubleId=id;
  document.getElementById('trouble-modal-title').textContent='トラブルを編集';
  document.getElementById('tr-id').value=id;
  document.getElementById('tr-title').value=t.title||'';
  document.getElementById('tr-loc').value=t.location||'';
  document.getElementById('tr-urgency').value=t.urgency||'normal';
  document.getElementById('tr-owner').value=t.assignee||'長谷川 圭一';
  document.getElementById('tr-detail').value=t.detail||'';
  document.getElementById('tr-action').value=t.action||'';
  document.getElementById('tr-del-btn').style.display='inline-flex';
  openModal('modal-trouble');
}
async function saveTrouble(){
  const title=document.getElementById('tr-title').value.trim();
  if(!title){toast('件名を入力してください');return;}
  const payload={title,location:document.getElementById('tr-loc').value,urgency:document.getElementById('tr-urgency').value,assignee:document.getElementById('tr-owner').value,detail:document.getElementById('tr-detail').value,action:document.getElementById('tr-action').value};
  if(editingTroubleId){await sb.from('incidents').update(payload).eq('id',editingTroubleId);toast('✅ 更新しました');}
  else{await sb.from('incidents').insert({...payload,resolved:false});toast('🚨 記録しました');}
  closeModal('modal-trouble');
}
async function deleteTrouble(){
  if(!editingTroubleId||!confirm('削除しますか？'))return;
  await sb.from('incidents').delete().eq('id',editingTroubleId);
  closeModal('modal-trouble');toast('削除しました');
}
async function deleteTroubleById(id){
  if(!confirm('削除しますか？'))return;
  await sb.from('incidents').delete().eq('id',id);toast('削除しました');
}
async function resolveTrouble(id){await sb.from('incidents').update({resolved:true}).eq('id',id);toast('✅ 解決済み');}
async function reopenTrouble(id){await sb.from('incidents').update({resolved:false}).eq('id',id);toast('再開しました');}

sb.channel('trouble-rt').on('postgres_changes',{event:'*',schema:'public',table:'incidents'},()=>loadTroubles()).subscribe(s=>{if(s==='SUBSCRIBED')setSyncStatus('on');});

// ===== FAQ =====
let faqs=[
  {id:'f01',cat:'📡 映像・音響',q:'プロジェクターが映らない',a:'①接続ケーブルを確認。②Re-Vision担当者に即連絡。③予備ケーブルは操作室に保管。④解決しない場合はスクリーン投影なしで進行し、司会者にアナウンスを依頼。'},
  {id:'f02',cat:'📡 映像・音響',q:'マイクから音が出ない・ハウリングが発生',a:'①Re-Vision担当者に即連絡。②予備マイクと交換（操作室に保管）。③ハウリングはマイクとスピーカーの位置関係を調整。④登壇者に落ち着いて待機いただくよう伝える。'},
  {id:'f03',cat:'📡 映像・音響',q:'動画が再生されない',a:'①Re-Vision担当者に即連絡。②PCの音量・映像出力設定を確認。③バックアップUSBから再生。④それでも再生できない場合は省略し、司会者が口頭で内容を要約して進行を続ける。'},
  {id:'f04',cat:'👤 来賓・登壇者',q:'来賓・登壇者が予定時刻に到着しない',a:'①アテンド担当者が連絡先に電話。②到着予定時刻を確認し司会者に共有。③遅参の場合は進行順を調整（趣旨説明や動画放映で時間を調整）。④市長等公務による遅参は事前対応策を共有済み。'},
  {id:'f05',cat:'👤 来賓・登壇者',q:'登壇者が体調不良・急なキャンセル',a:'①委員長・室長に即報告。②該当パートの進行を他の登壇者・ファシリテーターで吸収。③司会者からアナウンス。④Supabaseトラブル欄に記録。'},
  {id:'f06',cat:'👥 参加者・会場',q:'参加者が定員を超えそう',a:'①受付で整理券配布に切り替え。②2階席へ誘導。③立見はNG。④受付担当リーダーに即報告。'},
  {id:'f07',cat:'👥 参加者・会場',q:'参加者が体調不良・気分が悪い',a:'①近くのスタッフが対応。②会場外へ誘導。③必要であれば救急車を要請（119）。④会場の救急箱の場所を事前確認。⑤進行はそのまま続ける。'},
  {id:'f08',cat:'📋 進行・運営',q:'タイムスケジュールが大幅に押している',a:'①司会者がファシリテーターに「あと〇分で締め」と合図。②各パートの終了合図は事前打合せ済み。③アンケート時間（4分）は削らない。④5分以上の遅延は委員長・室長に相談。'},
  {id:'f09',cat:'📋 進行・運営',q:'停電・火災など緊急事態が発生',a:'①参加者の安全を最優先。②会場スタッフの指示に従う。③司会者が冷静にアナウンス「非常時のため、スタッフの誘導に従い退場ください」。④会場の避難経路・集合場所を事前確認。'},
];
let faqIdCounter=200;
let editingFaqId=null;

function renderFAQ(){
  const el=document.getElementById('faq-list');
  const cats=[...new Set(faqs.map(f=>f.cat))];
  el.innerHTML=cats.map(cat=>`
    <div class="faq-cat">${cat}</div>
    ${faqs.filter(f=>f.cat===cat).map(f=>`
      <div class="faq-item" id="faq-${f.id}">
        <button class="faq-q" onclick="toggleFaq('${f.id}')">
          <span class="faq-q-icon">Q</span>
          <span style="flex:1;text-align:left">${f.q}</span>
          <button class="faq-edit-btn" onclick="event.stopPropagation();openEditFaq('${f.id}')">編集</button>
          <span class="faq-arrow">▼</span>
        </button>
        <div class="faq-a">A. ${f.a}</div>
      </div>`).join('')}`).join('');
}

function toggleFaq(id){document.getElementById('faq-'+id).classList.toggle('open');}

function openFaqModal(){
  editingFaqId=null;
  document.getElementById('faq-modal-title').textContent='FAQを追加';
  document.getElementById('faq-id').value='';
  document.getElementById('faq-cat').value='📡 映像・音響';
  document.getElementById('faq-q').value='';
  document.getElementById('faq-a').value='';
  document.getElementById('faq-del-btn').style.display='none';
  openModal('modal-faq');
}
function openEditFaq(id){
  const f=faqs.find(x=>x.id===id);if(!f)return;
  editingFaqId=id;
  document.getElementById('faq-modal-title').textContent='FAQを編集';
  document.getElementById('faq-id').value=id;
  document.getElementById('faq-cat').value=f.cat;
  document.getElementById('faq-q').value=f.q;
  document.getElementById('faq-a').value=f.a;
  document.getElementById('faq-del-btn').style.display='inline-flex';
  openModal('modal-faq');
}
function saveFaq(){
  const q=document.getElementById('faq-q').value.trim();
  const a=document.getElementById('faq-a').value.trim();
  if(!q||!a){toast('質問と対応方法を入力してください');return;}
  const payload={cat:document.getElementById('faq-cat').value,q,a};
  if(editingFaqId){const f=faqs.find(x=>x.id===editingFaqId);if(f)Object.assign(f,payload);toast('✅ 更新しました');}
  else{faqs.push({id:'f'+(faqIdCounter++),done:false,...payload});toast('✅ 追加しました');}
  closeModal('modal-faq');renderFAQ();
}
function deleteFaq(){
  if(!confirm('削除しますか？'))return;
  faqs=faqs.filter(x=>x.id!==editingFaqId);
  closeModal('modal-faq');renderFAQ();toast('削除しました');
}

function fmtTime(ts){if(!ts)return'';const d=new Date(ts);const diff=Math.floor((new Date()-d)/60000);if(diff<1)return'たった今';if(diff<60)return diff+'分前';if(diff<1440)return Math.floor(diff/60)+'時間前';return(d.getMonth()+1)+'/'+(d.getDate());}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
function toast(msg){const c=document.getElementById('toast-c');const t=document.createElement('div');t.className='toast';t.textContent=msg;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.3s';setTimeout(()=>t.remove(),300);},2500);}

renderFAQ();
loadTroubles();
</script>
