*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--gray-800);min-height:100vh;}

#toolbar{background:var(--navy);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:40px;z-index:80;border-bottom:2px solid var(--gold);}
.toolbar-title{font-family:'Noto Serif JP',serif;font-size:13px;color:var(--gold-light);font-weight:600;}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#9e9488;margin-right:4px;}
.sync-dot.on{background:#4aba7a;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.sync-label{font-size:11px;color:rgba(255,255,255,0.4);}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:4px;border:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:500;transition:all 0.15s;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--navy);}
.btn-outline{background:transparent;color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.2);}
.btn-outline:hover{background:rgba(255,255,255,0.08);}
.btn-sm{padding:4px 9px;font-size:11px;}
.btn-danger{background:var(--red);color:#fff;}
.btn-light{background:#fff;color:var(--gray-800);border:1px solid var(--gray-200);}
.btn-light:hover{background:var(--gray-50);}

#main{max-width:1100px;margin:0 auto;padding:20px 24px;}

.filter-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.filter-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--gray-200);background:#fff;color:var(--gray-600);font-family:'Noto Sans JP',sans-serif;font-size:12px;cursor:pointer;transition:all 0.15s;}
.filter-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.filter-btn:hover:not(.active){background:var(--gray-50);}

.notice{background:#fef9e7;border:1px solid rgba(201,168,76,0.3);border-radius:6px;padding:10px 14px;font-size:12px;color:var(--gray-600);margin-bottom:14px;display:flex;gap:8px;align-items:flex-start;}

/* SECTION */
.section-wrap{margin-bottom:20px;}
.section-header{background:var(--navy);color:#fff;padding:10px 16px;border-radius:6px 6px 0 0;display:flex;align-items:center;justify-content:space-between;}
.section-title{font-family:'Noto Serif JP',serif;font-size:13px;font-weight:600;color:var(--gold-light);}
.section-count{font-size:11px;color:rgba(255,255,255,0.4);}

/* TABLE */
.tbl-wrap{background:#fff;border:1px solid var(--gray-200);border-top:none;border-radius:0 0 6px 6px;overflow:hidden;}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{padding:8px 12px;background:var(--gray-50);font-size:11px;font-weight:600;color:var(--gray-400);text-align:left;border-bottom:1px solid var(--gray-200);white-space:nowrap;}
.tbl td{padding:0;border-bottom:1px solid var(--gray-100);vertical-align:middle;}
.tbl tbody tr:last-child td{border-bottom:none;}
.tbl tbody tr:hover td{background:rgba(201,168,76,0.04);}

/* INLINE EDIT */
.cell-input{width:100%;border:none;background:transparent;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--gray-800);padding:9px 12px;outline:none;cursor:text;}
.cell-input:focus{background:rgba(201,168,76,0.07);outline:2px solid var(--gold);outline-offset:-2px;border-radius:2px;}
.cell-input.name{font-weight:600;}

/* ACTION BTNS */
.row-actions{display:flex;gap:4px;padding:0 8px;opacity:0;transition:opacity 0.15s;}
.tbl tbody tr:hover .row-actions{opacity:1;}
.row-act-btn{padding:3px 8px;border-radius:3px;border:none;cursor:pointer;font-size:10.5px;font-weight:600;}
.edit-btn{background:var(--navy);color:#fff;}
.del-btn{background:var(--red);color:#fff;}

/* AREA BADGE */
.area-tag{display:inline-block;padding:2px 9px;border-radius:3px;font-size:11px;font-weight:600;white-space:nowrap;}

/* ADD ROW */
.add-row-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:9px;border:none;background:var(--gray-50);color:var(--gray-400);font-family:'Noto Sans JP',sans-serif;font-size:12px;cursor:pointer;transition:all 0.15s;border-top:1px solid var(--gray-100);}
.add-row-btn:hover{background:rgba(201,168,76,0.06);color:var(--gold);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(13,27,62,0.45);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:8px;width:520px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15);}
.modal-header{padding:15px 18px 12px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Noto Serif JP',serif;font-size:14px;font-weight:600;color:var(--navy);}
.modal-close{background:none;border:none;cursor:pointer;font-size:18px;color:var(--gray-400);}
.modal-body{padding:15px 18px;}
.modal-footer{padding:11px 18px;border-top:1px solid var(--gray-100);display:flex;justify-content:flex-end;gap:7px;}
.form-row{margin-bottom:12px;}
.form-label{font-size:11px;font-weight:600;color:var(--gray-600);margin-bottom:4px;display:block;}
.form-input,.form-select,.form-textarea{width:100%;padding:7px 10px;border:1px solid var(--gray-200);border-radius:4px;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--gray-800);background:#fff;outline:none;}
.form-input:focus,.form-select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.1);}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}

/* TOAST */
#toast-c{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;align-items:center;gap:6px;}
.toast{background:var(--navy);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;border:1px solid var(--gold);animation:tin 0.2s;}
@keyframes tin{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.loading{text-align:center;padding:40px;color:var(--gray-400);}

/* NAV */
#portal-nav{background:#060f22 !important;}
#portal-nav a{color:rgba(255,255,255,0.42) !important;text-decoration:none !important;}
#portal-nav-links a{display:inline-block;padding:4px 8px;border-radius:4px;font-size:11px;white-space:nowrap;text-decoration:none !important;border:1px solid transparent;}

function setSyncStatus(s){
  const dot=document.getElementById('sync-dot'),label=document.getElementById('sync-label');
  if(s==='on'){dot.className='sync-dot on';label.textContent='リアルタイム同期中';}
  else{dot.className='sync-dot';label.textContent='接続中...';}
}

async function loadRoles(){
  const{data,error}=await sb.from('roles').select('*').order('created_at');
  if(error){console.error(error);return;}
  roles=data||[];
  render();
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render(){
  const wrap=document.getElementById('roles-wrap');
  const filtered=currentFilter==='all'?roles:roles.filter(r=>r.area===currentFilter);

  const areas=['運営','ステージ','設営','アテンド','警備・誘導','受付'];
  const groups={};
  filtered.forEach(r=>{
    if(!groups[r.area])groups[r.area]=[];
    groups[r.area].push(r);
  });

  let html='';
  areas.forEach(area=>{
    if(!groups[area]||!groups[area].length)return;
    const color=AREA_COLORS[area]||'#566573';
    const items=groups[area];

          </tr></thead>
          <tbody>
            ${items.map(r=>`<tr>
              <td><input class="cell-input name" value="${esc(r.position||'')}" onchange="updateField('${r.id}','position',this.value)"></td>
              <td><input class="cell-input" value="${esc(r.role||'')}" onchange="updateField('${r.id}','role',this.value)"></td>
              <td><input class="cell-input" value="${esc(r.m1||'')}" onchange="updateField('${r.id}','m1',this.value)"></td>
              <td><input class="cell-input" value="${esc(r.m2||'')}" onchange="updateField('${r.id}','m2',this.value)"></td>
              <td><input class="cell-input" value="${esc(r.m3||'')}" onchange="updateField('${r.id}','m3',this.value)"></td>
              <td><input class="cell-input" value="${esc(r.note||'')}" placeholder="備考..." onchange="updateField('${r.id}','note',this.value)"></td>
              <td>
                <div class="row-actions">
                  <button class="row-act-btn edit-btn" onclick="openEditModal('${r.id}')">編集</button>
                  <button class="row-act-btn del-btn" onclick="confirmDelete('${r.id}')">削除</button>
                </div>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
        <button class="add-row-btn" onclick="openAddModalWithArea('${area}')">＋ ${area}に追加</button>
      </div>
    </div>`;
  });
  wrap.innerHTML=html;
}

function esc(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

async function updateField(id,field,value){
  const update={};update[field]=value;
  await sb.from('roles').update(update).eq('id',id);
  toast('保存しました');
}

async function confirmDelete(id){
  const r=roles.find(x=>x.id===id);
  if(!confirm(`「${r?r.position:''}」を削除しますか？`))return;
  await sb.from('roles').delete().eq('id',id);
  toast('削除しました');
}

// ADD MODAL
function openAddModal(){openAddModalWithArea(currentFilter==='all'?'運営':currentFilter);}
function openAddModalWithArea(area){
  editingId=null;
  document.getElementById('edit-modal-title').textContent='担当者を追加';
  document.getElementById('edit-id').value='';
  document.getElementById('edit-area').value=area;
  document.getElementById('edit-position').value='';
  document.getElementById('edit-role').value='';
  document.getElementById('edit-m1').value='';
  document.getElementById('edit-m2').value='';
  document.getElementById('edit-m3').value='';
  document.getElementById('edit-note').value='';
  document.getElementById('delete-btn').style.display='none';
  openModal('modal-edit');
}

// EDIT MODAL
function openEditModal(id){
  const r=roles.find(x=>x.id===id);
  if(!r)return;
  editingId=id;
  document.getElementById('edit-modal-title').textContent=r.position+' を編集';
  document.getElementById('edit-id').value=id;
  document.getElementById('edit-area').value=r.area||'運営';
  document.getElementById('edit-position').value=r.position||'';
  document.getElementById('edit-role').value=r.role||'';
  document.getElementById('edit-m1').value=r.m1||'';
  document.getElementById('edit-m2').value=r.m2||'';
  document.getElementById('edit-m3').value=r.m3||'';
  document.getElementById('edit-note').value=r.note||'';
  document.getElementById('delete-btn').style.display='inline-flex';
  openModal('modal-edit');
}

async function saveRole(){
  const payload={
    area:document.getElementById('edit-area').value,
    position:document.getElementById('edit-position').value,
    role:document.getElementById('edit-role').value,
    m1:document.getElementById('edit-m1').value,
    m2:document.getElementById('edit-m2').value,
    m3:document.getElementById('edit-m3').value,
    note:document.getElementById('edit-note').value,
  };
  if(!payload.position){toast('役職・ポジションを入力してください');return;}
  if(editingId){
    await sb.from('roles').update(payload).eq('id',editingId);
    toast('✅ 更新しました');
  } else {
    await sb.from('roles').insert(payload);
    toast('✅ 追加しました');
  }
  closeModal('modal-edit');
}

async function deleteRole(){
  if(!editingId)return;
  const r=roles.find(x=>x.id===editingId);
  if(!confirm(`「${r?r.position:''}」を削除しますか？`))return;
  await sb.from('roles').delete().eq('id',editingId);
  closeModal('modal-edit');
  toast('削除しました');
}

// REALTIME
sb.channel('roles-rt')
  .on('postgres_changes',{event:'*',schema:'public',table:'roles'},()=>loadRoles())
  .subscribe(s=>{if(s==='SUBSCRIBED')setSyncStatus('on');});

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
function toast(msg){const c=document.getElementById('toast-c');const t=document.createElement('div');t.className='toast';t.textContent=msg;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.3s';setTimeout(()=>t.remove(),300);},2500);}

// 初期データ投入
async function seedIfEmpty(){
  const{count}=await sb.from('roles').select('*',{count:'exact',head:true});
  if(count>0)return;
  for(const d of INITIAL_DATA){
    await sb.from('roles').insert({
      name:d.m1||d.position,
      position:d.position,
      area:d.area,
      role:d.role,
      m1:d.m1||'',
      m2:d.m2||'',
      m3:d.m3||'',
      note:d.note||'',
      status:'confirmed'
    });
  }
}

async function loadRoles(){
  const{data,error}=await sb.from('roles').select('*').order('created_at');
  if(error){console.error(error);return;}
  roles=data||[];
  render();
}

(async()=>{await seedIfEmpty();await loadRoles();})();
</script>
</body>
</html>
