<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第32回横浜経済人会議 | 進行シナリオ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0d1b3e;--gold:#c9a84c;--gold-light:#e8c97d;
  --white:#fff;--bg:#f5f3ee;
  --gray-100:#ede9e2;--gray-200:#ddd8cf;--gray-400:#9e9488;--gray-600:#6b6358;--gray-800:#3a342c;
  --red:#c0392b;--green:#1a7a4a;--blue:#1a4a8a;--orange:#c76b0a;--purple:#6d2e8a;
  /* 発言者カラー */
  --mc:#1a4a8a;        /* 司会者 */
  --mc-bg:#e8eef8;
  --rijicho:#7d3c98;   /* 理事長 */
  --rijicho-bg:#f3eaf8;
  --speaker:#1a7a4a;   /* 登壇者 */
  --speaker-bg:#e8f5ed;
  --staff:#c76b0a;     /* スタッフ */
  --staff-bg:#fef3e2;
  --note:#566573;      /* 備考 */
  --note-bg:#f0f2f4;
  --fasili:#c0392b;    /* ファシリテーター */
  --fasili-bg:#fdecea;
  --pc:#0a7d8c;        /* PC操作 */
  --pc-bg:#e0f4f6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--gray-800);font-size:14px;line-height:1.7;}

/* NAV */
#portal-nav-placeholder{}

/* TOOLBAR */
#toolbar{
  background:var(--navy);color:#fff;
  padding:10px 20px;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  position:sticky;top:40px;z-index:80;
  border-bottom:2px solid var(--gold);
}
.toolbar-title{font-family:'Noto Serif JP',serif;font-size:13px;color:var(--gold-light);font-weight:600;margin-right:8px;}
.btn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:4px;border:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:500;transition:all 0.15s;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--navy);}
.btn-outline{background:transparent;color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.25);}
.btn-outline:hover{background:rgba(255,255,255,0.1);}
.btn-red{background:var(--red);color:#fff;}
.btn-sm{padding:3px 8px;font-size:11px;}
.sep{width:1px;height:20px;background:rgba(255,255,255,0.15);}
.font-ctrl{display:flex;align-items:center;gap:4px;}
.font-val{color:#fff;font-size:12px;min-width:36px;text-align:center;}
#search-box{padding:5px 10px;border:1px solid rgba(255,255,255,0.2);border-radius:4px;background:rgba(255,255,255,0.08);color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:12px;width:180px;outline:none;}
#search-box::placeholder{color:rgba(255,255,255,0.35);}
#search-box:focus{border-color:var(--gold);}
.print-btn{margin-left:auto;}

/* SIDEBAR + CONTENT */
#layout{display:flex;min-height:calc(100vh - 82px);}

/* SIDEBAR */
#toc{
  width:220px;flex-shrink:0;
  background:var(--navy);
  padding:16px 0;
  position:sticky;top:82px;
  height:calc(100vh - 82px);
  overflow-y:auto;
}
.toc-section{margin-bottom:4px;}
.toc-item{
  display:block;padding:7px 16px;
  font-size:11.5px;color:rgba(255,255,255,0.5);
  cursor:pointer;border:none;background:none;text-align:left;width:100%;
  border-left:3px solid transparent;
  transition:all 0.1s;line-height:1.4;
}
.toc-item:hover{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.8);}
.toc-item.active{background:rgba(201,168,76,0.12);color:var(--gold-light);border-left-color:var(--gold);}
.toc-time{font-size:10px;color:rgba(255,255,255,0.3);display:block;margin-bottom:1px;font-variant-numeric:tabular-nums;}
.toc-part{font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.25);padding:10px 16px 4px;font-weight:600;}

/* MAIN CONTENT */
#main-content{flex:1;padding:28px 32px;max-width:960px;}

/* SECTION */
.section{margin-bottom:48px;}
.section-header{
  display:flex;align-items:center;gap:12px;
  margin-bottom:20px;padding-bottom:10px;
  border-bottom:2px solid var(--gold);
}
.section-num{
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  color:var(--navy);font-size:11px;font-weight:700;
  padding:2px 10px;border-radius:2px;letter-spacing:0.06em;white-space:nowrap;
}
.section-title{
  font-family:'Noto Serif JP',serif;font-size:18px;font-weight:700;
  color:var(--navy);flex:1;
}
.section-title[contenteditable="true"]:focus{outline:2px dashed var(--gold);border-radius:3px;padding:2px 4px;}
.section-meta{font-size:11px;color:var(--gray-400);white-space:nowrap;}
.section-add-btn{
  margin-left:8px;background:rgba(201,168,76,0.15);border:1px dashed var(--gold);
  color:var(--gold);border-radius:4px;padding:3px 10px;font-size:11px;cursor:pointer;
}
.section-add-btn:hover{background:rgba(201,168,76,0.25);}

/* CUES */
.cue-list{display:flex;flex-direction:column;gap:10px;}

.cue{
  border-radius:6px;border:1px solid;
  overflow:hidden;
  position:relative;
}
.cue:hover .cue-actions{opacity:1;}

/* 発言者別カラー */
.cue-mc      {background:var(--mc-bg);    border-color:#c8d8f0;}
.cue-rijicho {background:var(--rijicho-bg);border-color:#dcc8f0;}
.cue-speaker {background:var(--speaker-bg);border-color:#c0e0d0;}
.cue-staff   {background:var(--staff-bg);  border-color:#f0dcc0;}
.cue-note    {background:var(--note-bg);   border-color:#d8dde2;}
.cue-fasili  {background:var(--fasili-bg); border-color:#f0c8c8;}
.cue-pc      {background:var(--pc-bg);     border-color:#b0dde2;}

.cue-header{
  display:flex;align-items:center;gap:10px;
  padding:7px 14px 6px;
  border-bottom:1px solid rgba(0,0,0,0.06);
}
.cue-time{
  font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;
  color:var(--gray-600);min-width:44px;white-space:nowrap;
}
.cue-speaker-tag{
  font-size:11px;font-weight:700;padding:1px 9px;border-radius:3px;white-space:nowrap;
}
.tag-mc      {background:var(--mc);      color:#fff;}
.tag-rijicho {background:var(--rijicho); color:#fff;}
.tag-speaker {background:var(--speaker); color:#fff;}
.tag-staff   {background:var(--staff);   color:#fff;}
.tag-note    {background:var(--note);    color:#fff;}
.tag-fasili  {background:var(--fasili);  color:#fff;}
.tag-pc      {background:var(--pc);      color:#fff;}

.cue-label{font-size:12px;color:var(--gray-600);flex:1;}
.cue-duration{font-size:10px;color:var(--gray-400);white-space:nowrap;}

.cue-body{padding:10px 14px 12px;}
.cue-text{
  font-size:13.5px;line-height:1.85;color:var(--gray-800);
  white-space:pre-wrap;
}
.cue-text[contenteditable="true"]:focus{
  outline:2px dashed var(--gold);border-radius:3px;padding:4px;
}
.cue-remark{
  margin-top:8px;padding:6px 10px;
  background:rgba(0,0,0,0.04);border-left:3px solid var(--gray-200);
  border-radius:0 3px 3px 0;font-size:11.5px;color:var(--gray-600);
  white-space:pre-wrap;
}

/* ACTION BUTTONS */
.cue-actions{
  position:absolute;right:8px;top:8px;
  display:flex;gap:4px;
  opacity:0;transition:opacity 0.15s;
}
.cue-act-btn{
  padding:3px 7px;border-radius:3px;border:none;cursor:pointer;
  font-size:10px;font-weight:600;
}
.cue-edit-btn{background:var(--navy);color:#fff;}
.cue-del-btn{background:var(--red);color:#fff;}

/* ADD CUE */
.add-cue-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;padding:10px;
  border:1.5px dashed var(--gray-200);border-radius:6px;
  background:transparent;color:var(--gray-400);
  font-family:'Noto Sans JP',sans-serif;font-size:12px;cursor:pointer;
  transition:all 0.15s;margin-top:6px;
}
.add-cue-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,0.05);}

/* ADD SECTION */
.add-section-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:16px;
  border:2px dashed var(--gray-200);border-radius:8px;
  background:transparent;color:var(--gray-400);
  font-family:'Noto Sans JP',sans-serif;font-size:13px;cursor:pointer;
  transition:all 0.15s;margin-top:8px;
}
.add-section-btn:hover{border-color:var(--gold);color:var(--gold);}

/* HIGHLIGHT */
.highlight{background:rgba(201,168,76,0.3);border-radius:2px;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:8px;width:560px;max-width:96vw;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
.modal-header{padding:16px 20px 12px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Noto Serif JP',serif;font-size:15px;font-weight:600;color:var(--navy);}
.modal-close{background:none;border:none;cursor:pointer;font-size:18px;color:var(--gray-400);}
.modal-body{padding:18px 20px;}
.modal-footer{padding:12px 20px;border-top:1px solid var(--gray-100);display:flex;justify-content:flex-end;gap:8px;}
.form-row{margin-bottom:14px;}
.form-label{font-size:11.5px;font-weight:600;color:var(--gray-600);margin-bottom:5px;display:block;}
.form-input,.form-select,.form-textarea{width:100%;padding:7px 10px;border:1px solid var(--gray-200);border-radius:4px;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--gray-800);background:#fff;outline:none;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.12);}
.form-textarea{resize:vertical;min-height:100px;line-height:1.7;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* PRINT */
@media print{
  #toolbar,#toc,.cue-actions,.add-cue-btn,.add-section-btn,.section-add-btn,#portal-nav{display:none!important;}
  #layout{display:block;}
  #main-content{padding:16px;max-width:100%;}
  .cue{page-break-inside:avoid;border:1px solid #ccc!important;background:#fff!important;}
  .cue-header{background:#f5f5f5!important;}
  .section{page-break-before:auto;}
  body{background:#fff;font-size:12px;}
}

/* TOAST */
#toast-c{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;align-items:center;gap:6px;}
.toast{background:var(--navy);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;border:1px solid var(--gold);animation:tin 0.2s ease;}
@keyframes tin{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ===== MOBILE ===== */
@media (max-width: 768px) {
  body { font-size: 13px; }
  #toolbar { padding: 8px 14px !important; top: 40px; }
  #main, .content, [id="main"] { padding: 12px 14px !important; }
  .grid-2 { grid-template-columns: 1fr !important; gap: 12px !important; }
  .grid-3 { grid-template-columns: 1fr !important; gap: 10px !important; }
  .grid-4 { grid-template-columns: 1fr 1fr !important; gap: 10px !important; }
  .card { overflow-x: auto; }
  .tbl { min-width: 460px; }
  .btn { font-size: 11.5px !important; padding: 5px 10px !important; }
  .btn-sm { font-size: 11px !important; padding: 3px 8px !important; }
  #toc { display: none !important; }
  #layout { display: block !important; }
  #main-content { padding: 14px !important; }
  .progress-strip { flex-wrap: wrap; gap: 10px; }
  .filter-row { gap: 4px; }
  .filter-btn { font-size: 11px; padding: 4px 10px; }
  .arrival-grid { grid-template-columns: 1fr !important; }
  .cat-sidebar { position: static !important; }
  .grid-layout { grid-template-columns: 1fr !important; }
  .tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tab { white-space: nowrap; font-size: 12px; padding: 8px 12px; }
  .modal { width: 95vw !important; max-width: 95vw !important; }
  .grid-2.modal-grid, .g2 { grid-template-columns: 1fr !important; }
  .stat-pill { min-width: 60px; padding: 6px 10px; }
  .stat-num { font-size: 18px !important; }
  .filter-tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; flex-wrap: nowrap; }
  .filter-tab { white-space: nowrap; font-size: 11px; padding: 4px 10px; }
  #portal-nav a { font-size: 10px !important; padding: 3px 6px !important; }
  .section-header { flex-wrap: wrap; gap: 6px; }
  .section-title { font-size: 15px !important; }
  .timeline { padding-left: 16px; }
  .progress-strip .prog-bar { min-width: 100% !important; }
  .table-wrap { overflow-x: auto; }
}
@media (max-width: 480px) {
  .grid-4 { grid-template-columns: 1fr !important; }
  .stats-row { flex-wrap: wrap; gap: 6px; }
}

/* ===== NAV FIX ===== */
#portal-nav { background:#060f22 !important; }
#portal-nav a { color:rgba(255,255,255,0.42) !important; text-decoration:none !important; }
#portal-nav-links a { 
  display:inline-block;
  padding:4px 8px;
  border-radius:4px;
  font-size:11px;
  white-space:nowrap;
  text-decoration:none !important;
  border:1px solid transparent;
}
#portal-nav > a { 
  color:#c9a84c !important; 
  font-size:11px;
  flex-shrink:0;
}
@media (max-width:768px) {
  #portal-nav-links a { font-size:10px !important; padding:3px 6px !important; }
}
</style>
</head>
<body>
<!-- SHARED NAV -->
<nav id="portal-nav" style="background:#060f22;border-bottom:1px solid rgba(201,168,76,0.25);padding:0 12px;height:40px;display:flex;align-items:center;gap:0;position:sticky;top:0;z-index:999;font-family:'Noto Sans JP',sans-serif;">
  <a href="yokohama_keizaijin_32.html" style="font-family:'Noto Serif JP',serif;font-size:11px;color:#c9a84c;text-decoration:none;font-weight:700;white-space:nowrap;padding-right:8px;border-right:1px solid rgba(255,255,255,0.1);margin-right:6px;flex-shrink:0;">第32回</a>
  <div id="portal-nav-links" style="display:flex;gap:2px;overflow-x:auto;flex:1;-webkit-overflow-scrolling:touch;scrollbar-width:none;"></div>
</nav>
<script>
(function(){
  var pages=[{href:"yokohama_keizaijin_32.html",label:"🏠 ホーム"},{href:"scenario.html",label:"📜 シナリオ"},{href:"roles.html",label:"👤 役割分担"},{href:"arrivals.html",label:"✅ 到着管理"},{href:"sekijihyo.html",label:"🪑 席次表"},{href:"stage.html",label:"🎭 ステージ"},{href:"pr_schedule.html",label:"📣 広報"},{href:"checklist.html",label:"📦 準備物"},{href:"trouble.html",label:"⚠️ トラブル"},{href:"yokohama_kaigi_v6.html",label:"📋 申込管理"}];
  var cur=location.pathname.split("/").pop()||"yokohama_keizaijin_32.html";
  var nav=document.getElementById("portal-nav-links");
  if(!nav)return;
  pages.forEach(function(p){
    var a=document.createElement("a");a.href=p.href;a.textContent=p.label;
    var active=cur===p.href;
    a.style.cssText="padding:4px 8px;border-radius:4px;font-size:11px;text-decoration:none;white-space:nowrap;"
      +"font-weight:"+(active?"700":"400")+";"
      +"background:"+(active?"rgba(201,168,76,0.22)":"transparent")+";"
      +"color:"+(active?"#e8c97d":"rgba(255,255,255,0.42)")+";"
      +"border:"+(active?"1px solid rgba(201,168,76,0.35)":"1px solid transparent")+";";
    nav.appendChild(a);
  });
})();
</script>
<!-- END NAV -->



<!-- 共通ナビ（後で挿入） -->


<!-- TOOLBAR -->
<div id="toolbar">
  <span class="toolbar-title">📜 進行シナリオ</span>
  <div class="sep"></div>
  <input id="search-box" type="text" placeholder="🔍 シナリオを検索..." oninput="doSearch(this.value)">
  <div class="sep"></div>
  <div class="font-ctrl">
    <span style="font-size:11px;color:rgba(255,255,255,0.5)">文字</span>
    <button class="btn btn-outline btn-sm" onclick="changeFontSize(-1)">－</button>
    <span class="font-val" id="font-val">14px</span>
    <button class="btn btn-outline btn-sm" onclick="changeFontSize(1)">＋</button>
  </div>
  <div class="sep"></div>
  <button class="btn btn-outline btn-sm" onclick="toggleEditMode()">✏️ <span id="edit-mode-label">編集モード OFF</span></button>
  <button class="btn btn-gold btn-sm" onclick="openModal('modal-add-cue');setAddTarget(null,null)">＋ セリフ追加</button>
  <button class="btn btn-outline btn-sm print-btn" onclick="window.print()">🖨 印刷</button>
</div>

<!-- LAYOUT -->
<div id="layout">
  <!-- TOC -->
  <nav id="toc" id="toc-nav">
    <div id="toc-inner"></div>
  </nav>

  <!-- MAIN -->
  <div id="main-content">
    <div id="sections-wrap"></div>
    <button class="add-section-btn" onclick="openAddSection()">＋ セクションを追加（新しいシナリオ）</button>
  </div>
</div>

<!-- CUE EDIT MODAL -->
<div class="modal-overlay" id="modal-edit-cue">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="edit-cue-title">セリフを編集</div>
      <button class="modal-close" onclick="closeModal('modal-edit-cue')">✕</button>
    </div>
    <div class="modal-body">
      <div class="grid-2">
        <div class="form-row">
          <label class="form-label">時刻</label>
          <input class="form-input" id="cue-time" type="text" placeholder="17:00">
        </div>
        <div class="form-row">
          <label class="form-label">所要時間</label>
          <input class="form-input" id="cue-duration" type="text" placeholder="2分">
        </div>
      </div>
      <div class="grid-2">
        <div class="form-row">
          <label class="form-label">発言者</label>
          <select class="form-select" id="cue-speaker-sel">
            <option value="mc">🎤 司会者</option>
            <option value="rijicho">👔 理事長（川本泰之君）</option>
            <option value="fasili">🎙 ファシリテーター</option>
            <option value="speaker">🏛 登壇者</option>
            <option value="staff">⚙️ スタッフ・全員</option>
            <option value="pc">🖥 PC操作（Re-Vision）</option>
            <option value="note">📋 備考・ト書き</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-label">発言者の名前（詳細）</label>
          <input class="form-input" id="cue-speaker-name" placeholder="例: 永井副理事長">
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">内容ラベル（短い見出し）</label>
        <input class="form-input" id="cue-label" placeholder="例: 来賓紹介">
      </div>
      <div class="form-row">
        <label class="form-label">シナリオ本文（カンペテキスト）</label>
        <textarea class="form-textarea" id="cue-text" rows="6" placeholder="読み上げるテキストをここに入力..."></textarea>
      </div>
      <div class="form-row">
        <label class="form-label">備考・ト書き（スタッフ向けメモ）</label>
        <textarea class="form-textarea" id="cue-remark" rows="2" placeholder="例: 拍手が静まってから読む / 照明下げる"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-red btn-sm" id="cue-del-modal-btn" onclick="deleteCueFromModal()" style="margin-right:auto;display:none">削除</button>
      <button class="btn btn-outline" onclick="closeModal('modal-edit-cue')">キャンセル</button>
      <button class="btn btn-gold" onclick="saveCue()">保存</button>
    </div>
  </div>
</div>

<!-- ADD CUE (alias same modal) -->
<div class="modal-overlay" id="modal-add-cue">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">セリフ・ト書きを追加</div>
      <button class="modal-close" onclick="closeModal('modal-add-cue')">✕</button>
    </div>
    <div class="modal-body">
      <div class="grid-2">
        <div class="form-row">
          <label class="form-label">時刻</label>
          <input class="form-input" id="add-cue-time" type="text" placeholder="17:00">
        </div>
        <div class="form-row">
          <label class="form-label">所要時間</label>
          <input class="form-input" id="add-cue-duration" type="text" placeholder="2分">
        </div>
      </div>
      <div class="grid-2">
        <div class="form-row">
          <label class="form-label">発言者</label>

// ===== STATE =====
let editMode = false;
let editingCueId = null;
let editingSectionId = null;
let addTargetSectionId = null;
let fontSize = 14;

// ===== RENDER =====
function render() {
  const wrap = document.getElementById('sections-wrap');
  wrap.innerHTML = '';
  sections.forEach(sec => {
    wrap.appendChild(renderSection(sec));
  });
  renderTOC();
  populateSectionSelect();
}

function renderSection(sec) {
  const div = document.createElement('div');
  div.className = 'section';
  div.id = 'sec-' + sec.id;

  const catColors = { main:'#c9a84c', panel:'#1a7a4a', teigen:'#7d3c98', other:'#566573' };
  const catLabels = { main:'全体進行', panel:'パネル', teigen:'政策提言', other:'その他' };

  div.innerHTML = `
    <div class="section-header">
      <span class="section-num" style="background:${catColors[sec.cat]||'#c9a84c'}">${catLabels[sec.cat]||'その他'}</span>
      <div class="section-title" ${editMode?'contenteditable="true"':''} onblur="updateSectionName('${sec.id}',this.textContent)">${sec.name}</div>
      <span class="section-meta">${sec.time||''}</span>
      ${editMode?`<button class="section-add-btn" onclick="openModal('modal-add-cue');setAddTarget('${sec.id}',null)">＋ 追加</button>`:''}
    </div>
    <div class="cue-list" id="cuelist-${sec.id}">
      ${sec.cues.map(c => renderCue(c, sec.id)).join('')}
    </div>
    ${editMode?`<button class="add-cue-btn" onclick="openModal('modal-add-cue');setAddTarget('${sec.id}',null)">＋ このセクションにセリフ・ト書きを追加</button>`:''}
  `;
  return div;
}

function renderCue(c, secId) {
  const sp = SPEAKER_MAP[c.speaker] || SPEAKER_MAP.note;
  const nameStr = c.speakerName ? ` — ${c.speakerName}` : '';
  return `
    <div class="cue ${sp.cls}" id="cue-${c.id}" style="font-size:${fontSize}px">
      <div class="cue-header">
        <span class="cue-time">${c.time||''}</span>
        <span class="cue-speaker-tag ${sp.tag}">${sp.label}${nameStr}</span>
        <span class="cue-label">${c.label}</span>
        <span class="cue-duration">${c.duration||''}</span>
      </div>
      <div class="cue-body">
        <div class="cue-text" ${editMode?'contenteditable="true"':''} onblur="updateCueText('${secId}','${c.id}',this.textContent)">${escHtml(c.text)}</div>
        ${c.remark?`<div class="cue-remark">📋 ${escHtml(c.remark)}</div>`:''}
      </div>
      ${editMode?`<div class="cue-actions">
        <button class="cue-act-btn cue-edit-btn" onclick="openEditCue('${secId}','${c.id}')">編集</button>
        <button class="cue-act-btn cue-del-btn" onclick="deleteCue('${secId}','${c.id}')">削除</button>
      </div>`:''}
    </div>`;
}

function renderTOC() {
  const toc = document.getElementById('toc-inner');
  toc.innerHTML = '';
  sections.forEach(sec => {
    const part = document.createElement('div');
    part.className = 'toc-section';
    part.innerHTML = `<div class="toc-part">${sec.name}</div>` +
      sec.cues.map(c => `
        <button class="toc-item" onclick="scrollToCue('${c.id}')" id="toc-${c.id}">
          ${c.time?`<span class="toc-time">${c.time}</span>`:''}
          ${c.label}
        </button>`).join('');
    toc.appendChild(part);
  });
}

function scrollToCue(id) {
  const el = document.getElementById('cue-' + id);
  if (el) { el.scrollIntoView({ behavior:'smooth', block:'center' }); el.style.outline='2px solid var(--gold)'; setTimeout(()=>el.style.outline='',1500); }
}

// ===== EDIT MODE =====
function toggleEditMode() {
  editMode = !editMode;
  document.getElementById('edit-mode-label').textContent = editMode ? '編集モード ON' : '編集モード OFF';
  render();
  toast(editMode ? '✏️ 編集モード ON — セルをクリックして直接編集できます' : '編集モードを終了しました');
}

function updateSectionName(secId, val) {
  const sec = sections.find(s => s.id === secId);
  if (sec && val.trim()) sec.name = val.trim();
}
function updateCueText(secId, cueId, val) {
  const sec = sections.find(s => s.id === secId);
  if (!sec) return;
  const c = sec.cues.find(x => x.id === cueId);
  if (c) c.text = val;
}

// ===== CUE EDIT MODAL =====
function openEditCue(secId, cueId) {
  const sec = sections.find(s => s.id === secId);
  if (!sec) return;
  const c = sec.cues.find(x => x.id === cueId);
  if (!c) return;
  editingCueId = cueId;
  editingSectionId = secId;
  document.getElementById('edit-cue-title').textContent = c.label + ' を編集';
  document.getElementById('cue-time').value = c.time || '';
  document.getElementById('cue-duration').value = c.duration || '';
  document.getElementById('cue-speaker-sel').value = c.speaker || 'mc';
  document.getElementById('cue-speaker-name').value = c.speakerName || '';
  document.getElementById('cue-label').value = c.label || '';
  document.getElementById('cue-text').value = c.text || '';
  document.getElementById('cue-remark').value = c.remark || '';
  document.getElementById('cue-del-modal-btn').style.display = 'inline-flex';
  openModal('modal-edit-cue');
}
function saveCue() {
  const sec = sections.find(s => s.id === editingSectionId);
  if (!sec) return;
  const c = sec.cues.find(x => x.id === editingCueId);
  if (!c) return;
  c.time = document.getElementById('cue-time').value;
  c.duration = document.getElementById('cue-duration').value;
  c.speaker = document.getElementById('cue-speaker-sel').value;
  c.speakerName = document.getElementById('cue-speaker-name').value;
  c.label = document.getElementById('cue-label').value;
  c.text = document.getElementById('cue-text').value;
  c.remark = document.getElementById('cue-remark').value;
  closeModal('modal-edit-cue');
  render();
  toast('保存しました');
}
function deleteCueFromModal() {
  if (!confirm('削除しますか？')) return;
  deleteCue(editingSectionId, editingCueId);
  closeModal('modal-edit-cue');
}
function deleteCue(secId, cueId) {
  const sec = sections.find(s => s.id === secId);
  if (!sec) return;
  sec.cues = sec.cues.filter(x => x.id !== cueId);
  render();
  toast('削除しました');
}

// ===== ADD CUE =====
function setAddTarget(secId, cueId) {
  addTargetSectionId = secId;
  populateSectionSelect();
  if (secId) {
    const sel = document.getElementById('add-cue-section');
    if (sel) sel.value = secId;
  }
}
function addCue() {
  const secId = document.getElementById('add-cue-section').value;
  const sec = sections.find(s => s.id === secId);
  if (!sec) { toast('セクションを選択してください'); return; }
  const label = document.getElementById('add-cue-label').value.trim();
  if (!label) { toast('内容ラベルを入力してください'); return; }
  sec.cues.push({
    id: 'c_' + Date.now(),
    time: document.getElementById('add-cue-time').value,
    duration: document.getElementById('add-cue-duration').value,
    speaker: document.getElementById('add-cue-speaker-sel').value,
    speakerName: document.getElementById('add-cue-speaker-name').value,
    label,
    text: document.getElementById('add-cue-text').value,
    remark: document.getElementById('add-cue-remark').value,
  });
  closeModal('modal-add-cue');
  render();
  toast('追加しました');
  ['add-cue-time','add-cue-duration','add-cue-speaker-name','add-cue-label','add-cue-text','add-cue-remark'].forEach(id=>{
    const el=document.getElementById(id); if(el)el.value='';
  });
}

// ===== ADD SECTION =====
function openAddSection() { openModal('modal-add-section'); }
function addSection() {
  const name = document.getElementById('sec-name').value.trim();
  if (!name) { toast('セクション名を入力してください'); return; }
  sections.push({
    id: 'sec_' + Date.now(),
    name,
    time: document.getElementById('sec-time').value,
    cat: document.getElementById('sec-cat').value,
    cues: []
  });
  closeModal('modal-add-section');
  render();
  toast(name + ' を追加しました');
  document.getElementById('sec-name').value='';
  document.getElementById('sec-time').value='';
}

function populateSectionSelect() {
  const sel = document.getElementById('add-cue-section');
  if (!sel) return;
  sel.innerHTML = sections.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  if (addTargetSectionId) sel.value = addTargetSectionId;
}

// ===== SEARCH =====
function doSearch(q) {
  document.querySelectorAll('.cue').forEach(el => {
    el.querySelectorAll('.highlight').forEach(h => {
      h.outerHTML = h.textContent;
    });
  });
  if (!q.trim()) return;
  document.querySelectorAll('.cue-text, .cue-remark, .cue-label').forEach(el => {
    const text = el.textContent;
    if (text.includes(q)) {
      el.innerHTML = el.innerHTML.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'), `<span class="highlight">${q}</span>`);
    }
  });
}

// ===== FONT SIZE =====
function changeFontSize(d) {
  fontSize = Math.max(10, Math.min(22, fontSize + d));
  document.getElementById('font-val').textContent = fontSize + 'px';
  document.querySelectorAll('.cue').forEach(el => el.style.fontSize = fontSize + 'px');
}

// ===== UTILS =====
function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if(e.target===o) o.classList.remove('open'); }));
function toast(msg) {
  const c=document.getElementById('toast-c');
  const t=document.createElement('div');t.className='toast';t.textContent=msg;c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.3s';setTimeout(()=>t.remove(),300);},2500);
}

// ===== INIT =====
render();
