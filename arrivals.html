<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第32回横浜経済人会議 | 来賓・登壇者 到着管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --navy:#0d1b3e;--gold:#c9a84c;--gold-light:#e8c97d;
  --bg:#f5f3ee;--gray-100:#f0ede6;--gray-200:#e2ddd4;--gray-400:#9e9488;--gray-600:#6b6358;--gray-800:#3a342c;
  --green:#1a7a4a;--green-light:#e8f5ed;--red:#c0392b;--red-light:#fdecea;--orange:#c76b0a;--orange-light:#fef3e2;--blue:#1a4a8a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--gray-800);min-height:100vh;}
/* HEADER */
#header{background:linear-gradient(135deg,#0d1b3e,#162a5e);padding:14px 20px;border-bottom:2px solid var(--gold);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.header-title{font-family:'Noto Serif JP',serif;font-size:17px;font-weight:700;color:var(--gold-light);}
.header-sub{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px;}
.stats-row{display:flex;gap:8px;}
.stat-pill{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:6px;padding:7px 14px;text-align:center;min-width:70px;}
.stat-num{font-size:20px;font-weight:700;line-height:1;}
.stat-pill.arrived .stat-num{color:#4aba7a;}
.stat-pill.pending .stat-num{color:var(--gold-light);}
.stat-pill.total .stat-num{color:#fff;}
.stat-label{font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px;}
/* TOOLBAR */
#toolbar{background:var(--navy);padding:9px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,0.1);}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#9e9488;margin-right:4px;}
.sync-dot.on{background:#4aba7a;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.sync-label{font-size:11px;color:rgba(255,255,255,0.4);}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 13px;border-radius:4px;border:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:500;transition:all 0.15s;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--navy);}
.btn-outline{background:transparent;color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.2);}
.btn-outline:hover{background:rgba(255,255,255,0.08);}
.btn-sm{padding:4px 9px;font-size:11px;}
.btn-danger{background:var(--red);color:#fff;}
/* FILTER */
.filter-tabs{display:flex;gap:5px;padding:10px 20px;background:#fff;border-bottom:1px solid var(--gray-200);overflow-x:auto;-webkit-overflow-scrolling:touch;}
.filter-tab{padding:4px 12px;border-radius:20px;border:1px solid var(--gray-200);background:#fff;color:var(--gray-600);font-family:'Noto Sans JP',sans-serif;font-size:11.5px;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.filter-tab.active{background:rgba(201,168,76,0.12);border-color:var(--gold);color:#0d1b3e;font-weight:600;}
/* MAIN */
#main{padding:16px 20px;max-width:1100px;margin:0 auto;}
/* CARD */
.arrival-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.arrival-card{background:#fff;border:1px solid var(--gray-200);border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.05);transition:all 0.2s;}
.arrival-card.arrived{border-color:rgba(39,174,96,0.35);background:#f8fdf9;}
.arrival-card.waiting{border-color:rgba(201,168,76,0.35);background:#fffef5;}
.card-top{padding:12px 14px 8px;display:flex;align-items:flex-start;gap:10px;}
.arrival-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:var(--gray-100);}
.type-guest .arrival-icon{background:rgba(201,168,76,0.15);border:2px solid rgba(201,168,76,0.3);}
.type-speaker .arrival-icon{background:rgba(26,74,138,0.1);border:2px solid rgba(26,74,138,0.2);}
.type-staff .arrival-icon{background:rgba(86,101,115,0.1);border:2px solid rgba(86,101,115,0.2);}
.card-info{flex:1;min-width:0;}
.card-name{font-size:14px;font-weight:700;color:#0d1b3e;line-height:1.3;}
.card-org{font-size:11px;color:var(--gray-400);margin-top:2px;line-height:1.4;}
.card-type-badge{display:inline-block;margin-top:4px;padding:1px 7px;border-radius:3px;font-size:10px;font-weight:600;}
.badge-guest{background:rgba(201,168,76,0.15);color:#8a6a00;border:1px solid rgba(201,168,76,0.3);}
.badge-speaker{background:rgba(26,74,138,0.1);color:var(--blue);border:1px solid rgba(26,74,138,0.2);}
.badge-staff{background:var(--gray-100);color:var(--gray-600);border:1px solid var(--gray-200);}
/* EDIT BUTTON */
.card-edit-btn{padding:3px 8px;border-radius:3px;border:1px solid var(--gray-200);background:#fff;color:var(--gray-400);font-size:10px;cursor:pointer;flex-shrink:0;transition:all 0.15s;}
.card-edit-btn:hover{border-color:var(--gold);color:var(--gold);}
/* STATUS */
.status-section{padding:8px 14px 12px;border-top:1px solid var(--gray-100);}
.status-buttons{display:flex;gap:5px;margin-bottom:6px;}
.status-btn{flex:1;padding:6px 4px;border-radius:5px;border:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:600;transition:all 0.15s;opacity:0.35;}
.status-btn.active{opacity:1;}
.status-btn.not-arrived{background:rgba(192,57,43,0.1);color:var(--red);border:1px solid rgba(192,57,43,0.2);}
.status-btn.not-arrived.active{background:rgba(192,57,43,0.15);border-color:var(--red);}
.status-btn.waiting{background:rgba(201,168,76,0.1);color:#8a6a00;border:1px solid rgba(201,168,76,0.2);}
.status-btn.waiting.active{background:rgba(201,168,76,0.18);border-color:var(--gold);}
.status-btn.arrived{background:rgba(39,174,96,0.1);color:var(--green);border:1px solid rgba(39,174,96,0.2);}
.status-btn.arrived.active{background:rgba(39,174,96,0.15);border-color:var(--green);}
.arrival-time{font-size:10px;color:var(--gray-400);}
.card-note{font-size:11px;color:var(--gray-600);margin-top:4px;padding:4px 8px;background:var(--gray-100);border-radius:3px;}
/* SECTION HEADER */
.section-header{font-family:'Noto Serif JP',serif;font-size:13px;font-weight:600;color:#0d1b3e;margin:20px 0 10px;padding-bottom:7px;border-bottom:1px solid rgba(201,168,76,0.3);display:flex;align-items:center;gap:8px;}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(13,27,62,0.4);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:8px;width:480px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15);}
.modal-header{padding:15px 18px 12px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Noto Serif JP',serif;font-size:14px;font-weight:600;color:#0d1b3e;}
.modal-close{background:none;border:none;cursor:pointer;font-size:18px;color:var(--gray-400);}
.modal-body{padding:15px 18px;}
.modal-footer{padding:11px 18px;border-top:1px solid var(--gray-100);display:flex;justify-content:flex-end;gap:7px;}
.form-row{margin-bottom:12px;}
.form-label{font-size:11px;font-weight:600;color:var(--gray-600);margin-bottom:4px;display:block;}
.form-input,.form-select{width:100%;padding:7px 10px;border:1px solid var(--gray-200);border-radius:4px;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--gray-800);background:#fff;outline:none;}
.form-input:focus,.form-select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.1);}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
/* TOAST */
#toast-c{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;align-items:center;gap:6px;}
.toast{background:var(--navy);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;border:1px solid var(--gold);animation:tin 0.2s ease;}
@keyframes tin{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.loading{text-align:center;padding:40px;color:var(--gray-400);font-size:13px;}
.empty{text-align:center;padding:40px;color:var(--gray-400);font-size:13px;}
/* NAV FIX */
#portal-nav{background:#060f22 !important;}
#portal-nav a{color:rgba(255,255,255,0.42) !important;text-decoration:none !important;}
#portal-nav-links a{display:inline-block;padding:4px 8px;border-radius:4px;font-size:11px;white-space:nowrap;text-decoration:none !important;border:1px solid transparent;}
#portal-nav > a{color:#c9a84c !important;font-size:11px;flex-shrink:0;}
/* MOBILE */
@media(max-width:768px){
  #main{padding:12px 14px;}
  .arrival-grid{grid-template-columns:1fr;}
  .stats-row{flex-wrap:wrap;gap:6px;}
  .stat-pill{min-width:60px;padding:5px 10px;}
  .stat-num{font-size:17px;}
  .filter-tabs{padding:8px 14px;}
  #portal-nav a{font-size:10px !important;padding:3px 6px !important;}
}
</style>
</head>

  <div>
    <div class="header-title">✅ 来賓・登壇者 到着管理</div>

  </div>
  <div class="stats-row">
    <div class="stat-pill arrived"><div class="stat-num" id="stat-arrived">0</div><div class="stat-label">到着済</div></div>

</div>

</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="edit-modal-title">人物を追加</div>
      <button class="modal-close" onclick="closeModal('modal-edit')">✕</button>

</div>

<script>
const SB_URL='https://kukckeksvbdgosneezdh.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1a2NrZWtzdmJkZ29zbmVlemRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1Nzg2MjksImV4cCI6MjA5NjE1NDYyOX0.zM264r67WV4YI7_7cqC53rx5dYYoc77VncKydfNHQUY';
const sb=supabase.createClient(SB_URL,SB_KEY);

let arrivals=[];
let currentFilter='all';
let editingId=null;

function setSyncStatus(s){
  const dot=document.getElementById('sync-dot'),label=document.getElementById('sync-label');
  if(s==='on'){dot.className='sync-dot on';label.textContent='リアルタイム同期中';}
  else{dot.className='sync-dot';label.textContent='接続中...';}
}

async function loadArrivals(){
  const{data,error}=await sb.from('arrivals').select('*').order('sort_order').order('created_at');
  if(error){console.error(error);return;}
  arrivals=data||[];
  render();
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render(){
  const main=document.getElementById('main');
  let filtered=arrivals;
  if(currentFilter==='guest') filtered=arrivals.filter(a=>a.type==='guest');
  else if(currentFilter==='speaker') filtered=arrivals.filter(a=>a.type==='speaker');
  else if(currentFilter==='staff') filtered=arrivals.filter(a=>a.type==='staff');
  else if(currentFilter==='arrived') filtered=arrivals.filter(a=>a.arrival_status==='arrived');
  else if(currentFilter==='not_arrived') filtered=arrivals.filter(a=>a.arrival_status==='not_arrived');

  updateStats();
  if(!filtered.length){main.innerHTML='<div class="empty">該当する人物がいません</div>';return;}

  const groups={guest:{label:'👑 来賓',items:[]},speaker:{label:'🎤 登壇者',items:[]},staff:{label:'⚙️ スタッフ・その他',items:[]}};
  filtered.forEach(a=>{const g=groups[a.type]||groups.staff;g.items.push(a);});

  let html='';
  Object.values(groups).forEach(g=>{
    if(!g.items.length)return;
    html+=`<div class="section-header">${g.label} <span style="font-size:11px;color:var(--gray-400);font-family:'Noto Sans JP',sans-serif;font-weight:400;">${g.items.length}名</span></div>`;
    html+=`<div class="arrival-grid">`;
    g.items.forEach(a=>html+=renderCard(a));
    html+=`</div>`;
  });
  main.innerHTML=html;
}

function renderCard(a){
  const typeMap={guest:{icon:'👑',cls:'type-guest',badge:'badge-guest',label:'来賓'},speaker:{icon:'🎤',cls:'type-speaker',badge:'badge-speaker',label:'登壇者'},staff:{icon:'⚙️',cls:'type-staff',badge:'badge-staff',label:'スタッフ'}};
  const t=typeMap[a.type]||typeMap.staff;
  const isArrived=a.arrival_status==='arrived';
  const isWaiting=a.arrival_status==='waiting';
  const timeStr=a.arrival_time?new Date(a.arrival_time).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}):'';
  return`<div class="arrival-card ${isArrived?'arrived':isWaiting?'waiting':''} ${t.cls}">
    <div class="card-top">
      <div class="arrival-icon">${t.icon}</div>
      <div class="card-info">
        <div class="card-name">${a.name}</div>
        <div class="card-org">${a.organization||''}</div>
        <span class="card-type-badge ${t.badge}">${t.label}</span>
      </div>
      <button class="card-edit-btn" onclick="openEditModal('${a.id}')">✏️ 編集</button>
    </div>
    <div class="status-section">
      <div class="status-buttons">
        <button class="status-btn not-arrived ${a.arrival_status==='not_arrived'?'active':''}" onclick="updateStatus('${a.id}','not_arrived')">❌ 未着</button>
        <button class="status-btn waiting ${a.arrival_status==='waiting'?'active':''}" onclick="updateStatus('${a.id}','waiting')">🟡 会場内</button>
        <button class="status-btn arrived ${a.arrival_status==='arrived'?'active':''}" onclick="updateStatus('${a.id}','arrived')">✅ 到着済</button>
      </div>
      ${timeStr?`<div class="arrival-time">到着確認: ${timeStr}</div>`:''}
      ${a.note?`<div class="card-note">📋 ${a.note}</div>`:''}
    </div>
  </div>`;
}

function updateStats(){
  const arrived=arrivals.filter(a=>a.arrival_status==='arrived').length;
  const waiting=arrivals.filter(a=>a.arrival_status==='waiting').length;
  const notArrived=arrivals.filter(a=>a.arrival_status==='not_arrived').length;
  document.getElementById('stat-arrived').textContent=arrived;
  document.getElementById('stat-waiting').textContent=waiting;
  document.getElementById('stat-not').textContent=notArrived;
  document.getElementById('stat-total').textContent=arrivals.length;
}

async function updateStatus(id,status){
  const update={arrival_status:status};
  if(status==='arrived') update.arrival_time=new Date().toISOString();
  else update.arrival_time=null;
  await sb.from('arrivals').update(update).eq('id',id);
  const a=arrivals.find(x=>x.id===id);
  if(a) toast(status==='arrived'?`✅ ${a.name} 到着確認`:status==='waiting'?`🟡 ${a.name} 会場内待機中`:`❌ ${a.name} 未着に変更`);
}

// ADD
function openAddModal(){
  editingId=null;
  document.getElementById('edit-modal-title').textContent='人物を追加';
  document.getElementById('edit-id').value='';
  document.getElementById('edit-name').value='';
  document.getElementById('edit-org').value='';
  document.getElementById('edit-type').value='guest';
  document.getElementById('edit-order').value='0';
  document.getElementById('edit-note').value='';
  document.getElementById('edit-delete-btn').style.display='none';
  openModal('modal-edit');
}

// EDIT
function openEditModal(id){
  const a=arrivals.find(x=>x.id===id);
  if(!a)return;
  editingId=id;
  document.getElementById('edit-modal-title').textContent=a.name+' を編集';
  document.getElementById('edit-id').value=id;
  document.getElementById('edit-name').value=a.name||'';
  document.getElementById('edit-org').value=a.organization||'';
  document.getElementById('edit-type').value=a.type||'guest';
  document.getElementById('edit-order').value=a.sort_order||0;
  document.getElementById('edit-note').value=a.note||'';
  document.getElementById('edit-delete-btn').style.display='inline-flex';
  openModal('modal-edit');
}

async function savePerson(){
  const name=document.getElementById('edit-name').value.trim();
  if(!name){toast('氏名を入力してください');return;}
  const payload={
    name,organization:document.getElementById('edit-org').value,
    type:document.getElementById('edit-type').value,
    note:document.getElementById('edit-note').value,
    sort_order:parseInt(document.getElementById('edit-order').value)||0,
  };
  if(editingId){
    await sb.from('arrivals').update(payload).eq('id',editingId);
    toast('✅ 更新しました');
  } else {
    await sb.from('arrivals').insert({...payload,arrival_status:'not_arrived'});
    toast('✅ 追加しました');
  }
  closeModal('modal-edit');
}

async function deletePerson(){
  if(!editingId)return;
  const a=arrivals.find(x=>x.id===editingId);
  if(!confirm(`「${a?a.name:''}」を削除しますか？`))return;
  await sb.from('arrivals').delete().eq('id',editingId);
  closeModal('modal-edit');
  toast('削除しました');
}

// REALTIME
sb.channel('arrivals-rt')
  .on('postgres_changes',{event:'*',schema:'public',table:'arrivals'},()=>loadArrivals())
  .subscribe(s=>{if(s==='SUBSCRIBED')setSyncStatus('on');});

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
function toast(msg){const c=document.getElementById('toast-c');const t=document.createElement('div');t.className='toast';t.textContent=msg;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.3s';setTimeout(()=>t.remove(),300);},3000);}
