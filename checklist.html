<style>
:root{--navy:#0d1b3e;--gold:#c9a84c;--gold-light:#e8c97d;--white:#fff;--bg:#f5f3ee;--gray-100:#f0ede6;--gray-200:#e2ddd4;--gray-400:#9e9488;--gray-600:#6b6358;--gray-800:#3a342c;--green:#1a7a4a;--green-light:#e8f5ed;--red:#c0392b;--orange:#c76b0a;--blue:#1a4a8a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Noto Sans JP",sans-serif;background:var(--bg);color:var(--gray-800);min-height:100vh;}
#toolbar{background:var(--navy);padding:10px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:40px;z-index:80;border-bottom:2px solid var(--gold);}

.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:4px;border:none;cursor:pointer;font-family:"Noto Sans JP",sans-serif;font-size:12.5px;font-weight:500;transition:all 0.15s;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--navy);}
.btn-outline{background:transparent;color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.2);}
.btn-outline:hover{background:rgba(255,255,255,0.1);}
.btn-sm{padding:4px 10px;font-size:11.5px;}
#main{max-width:1100px;margin:0 auto;padding:24px 28px;}
.progress-bar-wrap{background:#fff;border:1px solid var(--gray-200);border-radius:8px;padding:18px 22px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.progress-title{font-family:"Noto Serif JP",serif;font-size:14px;font-weight:600;color:var(--navy);}
.progress-pct{font-size:24px;font-weight:700;color:var(--green);}
.progress-bar{height:10px;background:var(--gray-100);border-radius:5px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),#4aba7a);border-radius:5px;transition:width 0.4s;}
.grid-layout{display:grid;grid-template-columns:240px 1fr;gap:20px;align-items:start;}
.cat-sidebar{background:#fff;border:1px solid var(--gray-200);border-radius:8px;overflow:hidden;position:sticky;top:100px;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
.cat-item{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-bottom:1px solid var(--gray-100);transition:background 0.1s;font-size:13px;border-left:3px solid transparent;}
.cat-item:last-child{border-bottom:none;}
.cat-item:hover{background:var(--gray-50,#f9f8f6);}
.cat-item.active{background:rgba(201,168,76,0.08);border-left-color:var(--gold);font-weight:600;color:var(--navy);}
.cat-count{font-size:11px;color:var(--gray-400);background:var(--gray-100);padding:1px 7px;border-radius:10px;}
.cat-done-count{font-size:11px;color:var(--green);background:var(--green-light);padding:1px 7px;border-radius:10px;}
.card{background:#fff;border:1px solid var(--gray-200);border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
.card-header{padding:13px 18px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-family:"Noto Serif JP",serif;font-size:13px;font-weight:600;color:var(--navy);}
.check-item{display:flex;align-items:flex-start;gap:12px;padding:11px 18px;border-bottom:1px solid var(--gray-100);transition:background 0.1s;}
.check-item:last-child{border-bottom:none;}
.check-item:hover{background:var(--gray-50,#f9f8f6);}
.check-box{width:20px;height:20px;border:2px solid var(--gray-200);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;margin-top:1px;}
.check-box.checked{background:var(--green);border-color:var(--green);color:#fff;font-size:12px;}
.check-info{flex:1;}
.check-name{font-size:13.5px;font-weight:500;line-height:1.4;}
.check-name.done{text-decoration:line-through;opacity:0.4;}
.check-meta{font-size:11px;color:var(--gray-400);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap;}
.tag{display:inline-block;padding:1px 7px;border-radius:3px;font-size:10.5px;font-weight:600;}
.check-qty{font-size:11px;color:var(--gray-600);background:var(--gray-100);padding:1px 7px;border-radius:3px;}
.check-note{font-size:11px;color:var(--orange);margin-top:3px;}
.priority-high{color:var(--red);font-size:10px;font-weight:700;background:#fdecea;padding:1px 6px;border-radius:3px;}
.priority-mid{color:var(--orange);font-size:10px;font-weight:700;background:#fef3e2;padding:1px 6px;border-radius:3px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(13,27,62,0.5);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:8px;width:520px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
.modal-header{padding:16px 20px 12px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:"Noto Serif JP",serif;font-size:15px;font-weight:600;color:var(--navy);}
.modal-close{background:none;border:none;cursor:pointer;font-size:18px;color:var(--gray-400);}
.modal-body{padding:16px 20px;}
.modal-footer{padding:12px 20px;border-top:1px solid var(--gray-100);display:flex;justify-content:flex-end;gap:8px;}
.form-row{margin-bottom:13px;}
.form-label{font-size:11.5px;font-weight:600;color:var(--gray-600);margin-bottom:4px;display:block;}
.form-input,.form-select{width:100%;padding:7px 10px;border:1px solid var(--gray-200);border-radius:4px;font-family:"Noto Sans JP",sans-serif;font-size:13px;color:var(--gray-800);outline:none;}
.form-input:focus,.form-select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.12);}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
#toast-c{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;align-items:center;gap:6px;}
.toast{background:var(--navy);color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;border:1px solid var(--gold);animation:tin 0.2s;}
@keyframes tin{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@media print{#toolbar,#portal-nav,.cat-sidebar,.modal-overlay{display:none!important;}#main{padding:10px;}#main .grid-layout{display:block;}}
</style>

let idCounter = 100;
let currentCat = 'all';

function render() {
  // 進捗
  const done = items.filter(x=>x.done).length;
  const total = items.length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('pct-sub').textContent = done + '/' + total + ' 完了';
  document.getElementById('progress-fill').style.width = pct + '%';

  // カテゴリサイドバー
  const cats = {'すべて':{total:total,done:done}};
  items.forEach(it => {
    if(!cats[it.cat]) cats[it.cat] = {total:0,done:0};
    cats[it.cat].total++;
    if(it.done) cats[it.cat].done++;
  });
  const sidebar = document.getElementById('cat-sidebar');
  sidebar.innerHTML = Object.entries(cats).map(([cat,g]) => `
    <div class="cat-item ${currentCat===cat?'active':''}" onclick="setCat('${cat}')">
      <span>${CAT_ICONS[cat]||'📋'} ${cat}</span>
      <span class="${g.done===g.total&&g.total>0?'cat-done-count':'cat-count'}">${g.done}/${g.total}</span>
    </div>`).join('');

  // アイテム一覧
  const filtered = currentCat === 'すべて' ? items : items.filter(x=>x.cat===currentCat);
  const groupByCat = {};
  filtered.forEach(it => {
    if(!groupByCat[it.cat]) groupByCat[it.cat] = [];
    groupByCat[it.cat].push(it);
  });

  const wrap = document.getElementById('items-wrap');
  wrap.innerHTML = Object.entries(groupByCat).map(([cat,itms]) => `
    <div class="card" style="margin-bottom:14px;">
      <div class="card-header">
        <div class="card-title">${CAT_ICONS[cat]||'📋'} ${cat}</div>
        <span style="font-size:11px;color:var(--gray-400)">${itms.filter(x=>x.done).length}/${itms.length} 完了</span>
      </div>
      ${itms.map(it => `
        <div class="check-item">
          <div class="check-box ${it.done?'checked':''}" onclick="toggle('${it.id}')">${it.done?'✓':''}</div>
          <div class="check-info">
            <div class="check-name ${it.done?'done':''}">${it.priority==='high'?'<span class=\'priority-high\'>🔴 必須</span> ':it.priority==='mid'?'<span class=\'priority-mid\'>🟡 重要</span> ':''}${it.name}</div>
            <div class="check-meta">
              ${it.qty?`<span class="check-qty">📦 ${it.qty}</span>`:''}
              ${it.owner?`<span>👤 ${it.owner}</span>`:''}
            </div>
            ${it.note?`<div class="check-note">💡 ${it.note}</div>`:''}
          </div>
          <button onclick="deleteItem('${it.id}')" style="background:none;border:none;cursor:pointer;color:var(--gray-200);font-size:16px;padding:2px 6px;opacity:0;" onmouseover="this.style.opacity=1;this.style.color='var(--red)';" onmouseout="this.style.opacity=0;">✕</button>
        </div>`).join('')}
    </div>`).join('');
}

function setCat(cat) { currentCat = cat; render(); }
function toggle(id) { const it=items.find(x=>x.id===id); if(it){it.done=!it.done;render();} }
function deleteItem(id) { if(confirm('削除しますか？')){items=items.filter(x=>x.id!==id);render();} }
function clearAll() { if(confirm('全チェックをクリアしますか？')){items.forEach(x=>x.done=false);render();} }

function addItem() {
  const name=document.getElementById('add-name').value.trim();
  if(!name){toast('品目名を入力してください');return;}
  items.push({id:'u'+idCounter++,done:false,name,cat:document.getElementById('add-cat').value,priority:document.getElementById('add-priority').value,qty:document.getElementById('add-qty').value,owner:document.getElementById('add-owner').value,note:document.getElementById('add-note').value});
  closeModal('modal-add');render();toast('追加しました');
  ['add-name','add-qty','add-owner','add-note'].forEach(id=>document.getElementById(id).value='');
}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open')}));
function toast(msg){const c=document.getElementById('toast-c');const t=document.createElement('div');t.className='toast';t.textContent=msg;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.3s';setTimeout(()=>t.remove(),300);},2500);}

render();
</script>
</body>
</html>
