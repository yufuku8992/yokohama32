<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第32回横浜経済人会議 | 事前準備物チェックリスト</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#0d1b3e;--gold:#c9a84c;--gold-light:#e8c97d;--bg:#f5f3ee;--gray-50:#f9f8f6;--gray-100:#f0ede6;--gray-200:#e2ddd4;--gray-400:#9e9488;--gray-600:#6b6358;--gray-800:#3a342c;--green:#1a7a4a;--green-light:#e8f5ed;--red:#c0392b;--orange:#c76b0a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--gray-800);min-height:100vh;}
#toolbar{background:var(--navy);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:40px;z-index:80;border-bottom:2px solid var(--gold);}
.toolbar-title{font-family:'Noto Serif JP',serif;font-size:13px;color:var(--gold-light);font-weight:600;}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 13px;border-radius:4px;border:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:500;transition:all 0.15s;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--navy);}
.btn-outline{background:transparent;color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.2);}
.btn-outline:hover{background:rgba(255,255,255,0.08);}
.btn-sm{padding:4px 9px;font-size:11px;}
.btn-danger{background:var(--red);color:#fff;}
.btn-light{background:#fff;color:var(--gray-800);border:1px solid var(--gray-200);}
#main{max-width:1100px;margin:0 auto;padding:20px 24px;}
.progress-bar-wrap{background:#fff;border:1px solid var(--gray-200);border-radius:8px;padding:16px 20px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.progress-title{font-family:'Noto Serif JP',serif;font-size:13px;font-weight:600;color:var(--navy);}
.progress-pct{font-size:22px;font-weight:700;color:var(--green);}
.progress-bar{height:10px;background:var(--gray-100);border-radius:5px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),#4aba7a);border-radius:5px;transition:width 0.4s;}
.grid-layout{display:grid;grid-template-columns:200px 1fr;gap:18px;align-items:start;}
.cat-sidebar{background:#fff;border:1px solid var(--gray-200);border-radius:8px;overflow:hidden;position:sticky;top:100px;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
.cat-item{padding:9px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-bottom:1px solid var(--gray-100);font-size:12.5px;border-left:3px solid transparent;transition:all 0.1s;}
.cat-item:last-child{border-bottom:none;}
.cat-item:hover{background:var(--gray-50);}
.cat-item.active{background:rgba(201,168,76,0.07);border-left-color:var(--gold);font-weight:600;color:var(--navy);}
.cat-count{font-size:10.5px;color:var(--gray-400);background:var(--gray-100);padding:1px 6px;border-radius:10px;}
.card{background:#fff;border:1px solid var(--gray-200);border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.05);margin-bottom:14px;}
.card-header{padding:11px 16px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-family:'Noto Serif JP',serif;font-size:12.5px;font-weight:600;color:var(--navy);}
.check-item{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:1px solid var(--gray-100);}
.check-item:last-child{border-bottom:none;}
.check-item:hover{background:var(--gray-50);}
.check-box{width:18px;height:18px;border:2px solid var(--gray-200);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;margin-top:2px;}
.check-box.checked{background:var(--green);border-color:var(--green);color:#fff;font-size:11px;}
.check-info{flex:1;}
.check-name{font-size:13px;font-weight:500;line-height:1.4;}
.check-name.done{text-decoration:line-through;opacity:0.4;}
.check-meta{font-size:11px;color:var(--gray-400);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;}
.check-note{font-size:11px;color:var(--orange);margin-top:2px;}
.priority-high{color:var(--red);font-size:10px;font-weight:700;background:#fdecea;padding:1px 6px;border-radius:3px;}
.priority-mid{color:var(--orange);font-size:10px;font-weight:700;background:#fef3e2;padding:1px 6px;border-radius:3px;}
.item-actions{display:flex;gap:3px;opacity:0;flex-shrink:0;}
.check-item:hover .item-actions{opacity:1;}
.act-btn{padding:2px 7px;border-radius:3px;border:none;cursor:pointer;font-size:10px;font-weight:600;}
.act-edit{background:var(--navy);color:#fff;}
.act-del{background:var(--red);color:#fff;}
.add-item-btn{display:flex;align-items:center;justify-content:center;gap:5px;width:100%;padding:9px;border:none;background:var(--gray-50);color:var(--gray-400);font-family:'Noto Sans JP',sans-serif;font-size:12px;cursor:pointer;transition:all 0.15s;border-top:1px solid var(--gray-100);}
.add-item-btn:hover{background:rgba(201,168,76,0.06);color:var(--gold);}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(13,27,62,0.45);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:8px;width:500px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15);}
.modal-header{padding:14px 18px 11px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Noto Serif JP',serif;font-size:14px;font-weight:600;color:var(--navy);}
.modal-close{background:none;border:none;cursor:pointer;font-size:18px;color:var(--gray-400);}
.modal-body{padding:14px 18px;}
.modal-footer{padding:11px 18px;border-top:1px solid var(--gray-100);display:flex;justify-content:flex-end;gap:7px;}
.form-row{margin-bottom:11px;}
.form-label{font-size:11px;font-weight:600;color:var(--gray-600);margin-bottom:3px;display:block;}
.form-input,.form-select{width:100%;padding:7px 10px;border:1px solid var(--gray-200);border-radius:4px;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--gray-800);background:#fff;outline:none;}
.form-input:focus,.form-select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.1);}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
#toast-c{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;align-items:center;gap:6px;}
.toast{background:var(--navy);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;border:1px solid var(--gold);animation:tin 0.2s;}
@keyframes tin{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
#portal-nav{background:#060f22 !important;}
#portal-nav a,#portal-nav-links a{text-decoration:none !important;}
#portal-nav>a{color:#c9a84c !important;flex-shrink:0;}
@media(max-width:768px){#main{padding:12px 14px;}.grid-layout{grid-template-columns:1fr;}.cat-sidebar{position:static !important;}.item-actions{opacity:1 !important;}#portal-nav a{font-size:10px !important;padding:3px 6px !important;}}
@media print{#toolbar,#portal-nav,.item-actions,.add-item-btn{display:none!important;}}
</style>
</head>
<body>
<!-- SHARED NAV -->
<nav id="portal-nav" style="background:#060f22;border-bottom:1px solid rgba(201,168,76,0.25);padding:0 12px;height:40px;display:flex;align-items:center;gap:0;position:sticky;top:0;z-index:999;font-family:'Noto Sans JP',sans-serif;">
  <a href="yokohama_keizaijin_32.html" style="font-family:'Noto Serif JP',serif;font-size:11px;color:#c9a84c;text-decoration:none;font-weight:700;white-space:nowrap;padding-right:8px;border-right:1px solid rgba(255,255,255,0.1);margin-right:6px;flex-shrink:0;">第32回</a>
  <div id="portal-nav-links" style="display:flex;gap:2px;overflow-x:auto;flex:1;-webkit-overflow-scrolling:touch;scrollbar-width:none;"></div>

<script>
(function(){var pages=[{href:"yokohama_keizaijin_32.html",label:"🏠 ホーム"},{href:"scenario.html",label:"📜 シナリオ"},{href:"roles.html",label:"👤 役割分担"},{href:"arrivals.html",label:"✅ 到着管理"},{href:"sekijihyo.html",label:"🪑 席次表"},{href:"stage.html",label:"🎭 ステージ"},{href:"pr_schedule.html",label:"📣 広報"},{href:"checklist.html",label:"📦 準備物"},{href:"trouble.html",label:"⚠️ トラブル"},{href:"yokohama_kaigi_v6.html",label:"📋 申込管理"}];var cur=location.pathname.split("/").pop()||"yokohama_keizaijin_32.html";var nav=document.getElementById("portal-nav-links");if(!nav)return;pages.forEach(function(p){var a=document.createElement("a");a.href=p.href;a.textContent=p.label;var active=cur===p.href;a.style.cssText="padding:4px 8px;border-radius:4px;font-size:11px;text-decoration:none;white-space:nowrap;font-weight:"+(active?"700":"400")+";background:"+(active?"rgba(201,168,76,0.22)":"transparent")+";color:"+(active?"#e8c97d":"rgba(255,255,255,0.42)")+";border:"+(active?"1px solid rgba(201,168,76,0.35)":"1px solid transparent")+";";nav.appendChild(a);});})();

<div id="toolbar">
  <span class="toolbar-title">📦 事前準備物チェックリスト</span>
  <div style="flex:1"></div>
  <button class="btn btn-outline btn-sm" onclick="clearAll()">全クリア</button>
  <button class="btn btn-outline btn-sm" onclick="window.print()">🖨 印刷</button>
  <button class="btn btn-gold" onclick="openAddModal()">＋ 追加</button>
</div>

<div id="main">
  <div class="progress-bar-wrap">
    <div class="progress-top">
      <div class="progress-title">📦 全体進捗</div>
      <div><span class="progress-pct" id="pct">0%</span> <span style="font-size:12px;color:var(--gray-400)" id="pct-sub">0/0 完了</span></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="grid-layout">
    <div class="cat-sidebar" id="cat-sidebar"></div>
    <div id="items-wrap"></div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <div class="modal-header"><div class="modal-title" id="edit-title">準備物を追加</div><button class="modal-close" onclick="closeModal('modal-edit')">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <div class="form-row"><label class="form-label">品目名 *</label><input class="form-input" id="edit-name" placeholder="名札・首下げ紐"></div>
      <div class="grid-2">
        <div class="form-row"><label class="form-label">カテゴリ</label>
          <select class="form-select" id="edit-cat">
            <option>印刷物・資料</option><option>受付関係</option><option>備品・機材</option>
            <option>映像・音響</option><option>登壇者関係</option><option>来賓関係</option>
            <option>動画・データ</option><option>その他</option>
          </select>
        </div>
        <div class="form-row"><label class="form-label">優先度</label>
          <select class="form-select" id="edit-priority"><option value="high">🔴 必須</option><option value="mid" selected>🟡 重要</option><option value="low">🟢 通常</option></select>
        </div>
        <div class="form-row"><label class="form-label">数量</label><input class="form-input" id="edit-qty" placeholder="20部 / 1式"></div>
        <div class="form-row"><label class="form-label">担当者</label><input class="form-input" id="edit-owner" placeholder="佐藤 美咲"></div>
      </div>
      <div class="form-row"><label class="form-label">備考</label><input class="form-input" id="edit-note" placeholder="前日までに準備など"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="edit-del-btn" onclick="deleteItem()" style="margin-right:auto;display:none">削除</button>
      <button class="btn btn-light btn-sm" onclick="closeModal('modal-edit')">キャンセル</button>
      <button class="btn btn-gold" onclick="saveItem()">保存</button>
    </div>
  </div>
</div>
<div id="toast-c"></div>

<script>
const CAT_ICONS={'印刷物・資料':'🗒','受付関係':'🎫','備品・機材':'🔧','映像・音響':'🎥','登壇者関係':'🎤','来賓関係':'👑','動画・データ':'💾','その他':'📋'};
let items=[
  {id:'c01',done:false,name:'当日進行シナリオ（全体版）',cat:'印刷物・資料',priority:'high',qty:'スタッフ全員分',owner:'福田 雄太郎',note:'各担当へ事前配布'},
  {id:'c02',done:false,name:'役割分担表（当日版）',cat:'印刷物・資料',priority:'high',qty:'スタッフ全員分',owner:'福田 雄太郎',note:''},
  {id:'c03',done:false,name:'緊急連絡先リスト',cat:'印刷物・資料',priority:'high',qty:'スタッフ全員分',owner:'長谷川 圭一',note:'全スタッフが携帯すること'},
  {id:'c04',done:false,name:'対外参加者名簿PDF 印刷',cat:'印刷物・資料',priority:'high',qty:'受付班分',owner:'青木 孝治',note:'前日までに最終版を印刷'},
  {id:'c05',done:false,name:'当日参加受付表（個人情報同意書付き）',cat:'受付関係',priority:'high',qty:'50部以上',owner:'青木 孝治',note:'記入見本も設置'},
  {id:'c06',done:false,name:'席札（ふんどし）各委員会分',cat:'受付関係',priority:'high',qty:'委員会20名・専務室5名',owner:'福田 雄太郎',note:'委員会名・氏名を記載'},
  {id:'c07',done:false,name:'来賓・登壇者用ネームプレート',cat:'来賓関係',priority:'high',qty:'14名分',owner:'菊地 正浩',note:'敬称・役職を正確に記載'},
  {id:'c08',done:false,name:'アンケートQRコード掲示スタンド',cat:'受付関係',priority:'high',qty:'場内5箇所分',owner:'福田 雄太郎',note:'スクリーン投影と併用'},
  {id:'c09',done:false,name:'芳名録（JCメンバー・シニア用）',cat:'受付関係',priority:'high',qty:'1冊',owner:'福田 雄太郎',note:'例会式典委員会から受領'},
  {id:'c10',done:false,name:'国旗・JC旗',cat:'備品・機材',priority:'high',qty:'各1本',owner:'弘中 義之',note:'掲揚位置はステージレイアウト参照'},
  {id:'c11',done:false,name:'ガムテープ・養生テープ',cat:'備品・機材',priority:'mid',qty:'各2本',owner:'菊地原 勇人',note:'どんでん・設営用'},
  {id:'c12',done:false,name:'延長コード・電源タップ',cat:'備品・機材',priority:'mid',qty:'3本以上',owner:'菊地原 勇人',note:''},
  {id:'c13',done:false,name:'筆記用具（ペン・ボールペン）',cat:'備品・機材',priority:'mid',qty:'20本',owner:'青木 孝治',note:'受付・各テーブル用'},
  {id:'c14',done:false,name:'プロジェクター動作確認（輝度調整）',cat:'映像・音響',priority:'high',qty:'リハーサル時に確認',owner:'弘中 義之',note:'Re-Vision社と実施'},
  {id:'c15',done:false,name:'マイク（ハンドマイク・ピンマイク・予備）',cat:'映像・音響',priority:'high',qty:'ハンド4本・ピン9本・予備2本',owner:'弘中 義之',note:'Re-Vision社持込。電池残量確認'},
  {id:'c16',done:false,name:'進行スライドデータ（バックアップUSB含む）',cat:'映像・音響',priority:'high',qty:'バックアップUSB含む',owner:'長谷川 圭一',note:'バックアップを必ず取ること'},
  {id:'c17',done:false,name:'オープニング動画データ',cat:'動画・データ',priority:'high',qty:'1本',owner:'荒井 亮一',note:'Re-Vision社'},
  {id:'c18',done:false,name:'政策提言動画①②③データ',cat:'動画・データ',priority:'high',qty:'3本',owner:'荒井 亮一',note:'Re-Vision社'},
  {id:'c19',done:false,name:'エンディング動画データ',cat:'動画・データ',priority:'high',qty:'1本',owner:'荒井 亮一',note:'Re-Vision社'},
  {id:'c20',done:false,name:'GREEN×EXPO2027 CMデータ',cat:'動画・データ',priority:'high',qty:'1本',owner:'弘中 義之',note:'開会前・休憩中・閉会後放映'},
  {id:'c21',done:false,name:'登壇者控室準備（お茶・ネームプレート）',cat:'登壇者関係',priority:'high',qty:'9名分',owner:'菊地 正浩',note:'著名人は会場内での声がけ避ける'},
  {id:'c22',done:false,name:'来賓アテンド担当者配置確認',cat:'来賓関係',priority:'high',qty:'4名分',owner:'菊地 正浩',note:'副理事長がアテンド。動線リハ必須'},
];
let idCounter=100;
let currentCat='すべて';
let editingId=null;

function render(){
  const done=items.filter(x=>x.done).length;
  const total=items.length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('pct').textContent=pct+'%';
  document.getElementById('pct-sub').textContent=done+'/'+total+' 完了';
  document.getElementById('progress-fill').style.width=pct+'%';
  // カテゴリサイドバー
  const cats={'すべて':{total:total,done:done}};
  items.forEach(it=>{if(!cats[it.cat])cats[it.cat]={total:0,done:0};cats[it.cat].total++;if(it.done)cats[it.cat].done++;});
  document.getElementById('cat-sidebar').innerHTML=Object.entries(cats).map(([cat,g])=>
    `<div class="cat-item ${currentCat===cat?'active':''}" onclick="setCat('${cat}')">
      <span>${CAT_ICONS[cat]||'📋'} ${cat}</span>
      <span class="cat-count">${g.done}/${g.total}</span>
    </div>`).join('');
  // アイテム
  const filtered=currentCat==='すべて'?items:items.filter(x=>x.cat===currentCat);
  const groups={};
  filtered.forEach(it=>{if(!groups[it.cat])groups[it.cat]=[];groups[it.cat].push(it);});
  document.getElementById('items-wrap').innerHTML=Object.entries(groups).map(([cat,itms])=>
    `<div class="card">
      <div class="card-header">
        <div class="card-title">${CAT_ICONS[cat]||'📋'} ${cat}</div>
        <span style="font-size:11px;color:var(--gray-400)">${itms.filter(x=>x.done).length}/${itms.length} 完了</span>
      </div>
      ${itms.map(it=>`
        <div class="check-item">
          <div class="check-box ${it.done?'checked':''}" onclick="toggle('${it.id}')">${it.done?'✓':''}</div>
          <div class="check-info">
            <div class="check-name ${it.done?'done':''}">${it.priority==='high'?'<span class="priority-high">🔴 必須</span> ':it.priority==='mid'?'<span class="priority-mid">🟡 重要</span> ':''}${it.name}</div>
            <div class="check-meta">${it.qty?`<span>📦 ${it.qty}</span>`:''} ${it.owner?`<span>👤 ${it.owner}</span>`:''}</div>
            ${it.note?`<div class="check-note">💡 ${it.note}</div>`:''}
          </div>
          <div class="item-actions">
            <button class="act-btn act-edit" onclick="openEditModal('${it.id}')">編集</button>
            <button class="act-btn act-del" onclick="deleteById('${it.id}')">削除</button>
          </div>
        </div>`).join('')}
      <button class="add-item-btn" onclick="openAddModalWithCat('${cat}')">＋ ${cat}に追加</button>
    </div>`).join('');
}

function setCat(cat){currentCat=cat;render();}
function toggle(id){const it=items.find(x=>x.id===id);if(it){it.done=!it.done;render();}}
function clearAll(){if(confirm('全チェックをクリアしますか？')){items.forEach(x=>x.done=false);render();}}

function openAddModal(){openAddModalWithCat(currentCat==='すべて'?'印刷物・資料':currentCat);}
function openAddModalWithCat(cat){
  editingId=null;
  document.getElementById('edit-title').textContent='準備物を追加';
  document.getElementById('edit-id').value='';
  document.getElementById('edit-name').value='';
  document.getElementById('edit-cat').value=cat;
  document.getElementById('edit-priority').value='mid';
  document.getElementById('edit-qty').value='';
  document.getElementById('edit-owner').value='';
  document.getElementById('edit-note').value='';
  document.getElementById('edit-del-btn').style.display='none';
  openModal('modal-edit');
}
function openEditModal(id){
  const it=items.find(x=>x.id===id);if(!it)return;
  editingId=id;
  document.getElementById('edit-title').textContent='準備物を編集';
  document.getElementById('edit-id').value=id;
  document.getElementById('edit-name').value=it.name||'';
  document.getElementById('edit-cat').value=it.cat||'その他';
  document.getElementById('edit-priority').value=it.priority||'mid';
  document.getElementById('edit-qty').value=it.qty||'';
  document.getElementById('edit-owner').value=it.owner||'';
  document.getElementById('edit-note').value=it.note||'';
  document.getElementById('edit-del-btn').style.display='inline-flex';
  openModal('modal-edit');
}
function saveItem(){
  const name=document.getElementById('edit-name').value.trim();
  if(!name){toast('品目名を入力してください');return;}
  const payload={name,cat:document.getElementById('edit-cat').value,priority:document.getElementById('edit-priority').value,qty:document.getElementById('edit-qty').value,owner:document.getElementById('edit-owner').value,note:document.getElementById('edit-note').value};
  if(editingId){const it=items.find(x=>x.id===editingId);if(it)Object.assign(it,payload);toast('✅ 更新しました');}
  else{items.push({id:'u'+(idCounter++),done:false,...payload});toast('✅ 追加しました');}
  closeModal('modal-edit');render();
}
function deleteItem(){deleteById(editingId);closeModal('modal-edit');}
function deleteById(id){if(!confirm('削除しますか？'))return;items=items.filter(x=>x.id!==id);render();toast('削除しました');}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
function toast(msg){const c=document.getElementById('toast-c');const t=document.createElement('div');t.className='toast';t.textContent=msg;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.3s';setTimeout(()=>t.remove(),300);},2500);}
render();
</script>
</body>
</html>
